<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS — single source of truth
    ══════════════════════════════════════════ */
    :root {
      --bg:         #EFF2F7;
      --surface:    #FFFFFF;
      --surface-2:  #F6F8FC;
      --border:     #DDE3EE;
      --text:       #1A2A42;
      --text-2:     #5A6A82;
      --accent:     #2563EB;
      --accent-2:   #1D55D4;
      --accent-bg:  #EBF2FF;
      --danger:     #DC2626;
      --green:      #16A34A;
      --shadow-sm:  0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
      --shadow-md:  0 4px 16px rgba(15,23,42,.08), 0 1px 3px rgba(15,23,42,.04);
      --shadow-lg:  0 12px 32px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.04);
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --radius-xl:  20px;
      --font: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ══════════════════════════════════════════ RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; transition: background .15s, color .15s, box-shadow .15s, border-color .15s, opacity .15s; }
    a { color: inherit; text-decoration: none; }
    .an { display: none !important; }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    .ung-dung { width: 100%; min-height: 100vh; }
    .khung {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px;
    }
    .bo-cuc {
      display: grid;
      grid-template-columns: 256px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    /* ══════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════ */
    .side {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: sticky;
      top: 20px;
    }
    .panel-card {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-card:last-child { border-bottom: none; }

    /* Profile block */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px;
    }
    .profile-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.2;
    }
    .profile-email {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    /* Avatar */
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      letter-spacing: .02em;
    }
    .avatar.lg { width: 52px; height: 52px; font-size: 16px; }

    /* Section title */
    .side-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-2);
      margin-bottom: 10px;
    }

    /* Group item */
    .group-list { display: grid; gap: 6px; }
    .group-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: default;
    }
    .group-item.active {
      background: var(--accent-bg);
      border-color: #BFDBFE;
    }
    .group-item .avatar { background: var(--accent-2); width: 36px; height: 36px; font-size: 12px; }
    .group-item.active .avatar { background: var(--accent); }
    .group-item strong { display: block; font-size: 14px; font-weight: 700; }
    .group-item span { display: block; font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .group-item.active span { color: #3B82F6; }
    .group-item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .group-inline-btn {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .group-inline-btn:hover { background: var(--surface-2); color: var(--text); }

    /* Menu items */
    .menu-list { display: grid; gap: 4px; }
    .menu-box-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      color: var(--text-2);
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }
    .menu-box-item:hover { background: var(--surface-2); color: var(--text); border-color: var(--border); }
    .menu-box-item.active { background: var(--accent-bg); color: var(--accent); border-color: #BFDBFE; }
    .menu-icon-round {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .menu-box-item.active .menu-icon-round { background: #DBEAFE; }
    .menu-text { flex: 1; font-weight: 600; }
    .nav-so {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    /* Action buttons */
    .side-action-btn, .ghost-row-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-weight: 600;
      font-size: 13px;
    }
    .side-action-btn:hover, .ghost-row-btn:hover { background: var(--surface-2); color: var(--text); }
    .menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ══════════════════════════════════════════
       MAIN CONTENT
    ══════════════════════════════════════════ */
    .giua {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .main-hero {
      padding: 24px 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .main-hero h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
    }
    .main-hero .summary-line {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 4px;
    }

    /* Search + filter bar */
    .search-panel {
      margin-top: 16px;
      padding-bottom: 18px;
      display: grid;
      gap: 10px;
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .tim {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 42px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
    }
    .tim:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: var(--surface);
    }
    .tim input { border: none; outline: none; background: transparent; width: 100%; font-size: 13px; }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: 8px;
    }

    /* Feed */
    .feed-wrap { padding: 18px; background: var(--surface-2); border-top: 1px solid var(--border); }
    .feed { display: grid; gap: 14px; }

    /* Post card */
    .the {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .the-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .meta { display: flex; align-items: center; gap: 10px; }
    .ten { font-size: 14px; font-weight: 700; }
    .sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .nhan {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid #BFDBFE;
    }
    .post-title { font-size: 16px; font-weight: 700; letter-spacing: -.02em; margin-top: 12px; color: var(--text); }
    .noi-dung-bai {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
    }
    .noi-dung-bai p, .bl-nd p { margin: .4em 0; }
    .noi-dung-bai ul, .noi-dung-bai ol, .bl-nd ul, .bl-nd ol { padding-left: 22px; margin: .4em 0; }
    .noi-dung-bai img, .bl-nd img {
      display: block; max-width: 100%; height: auto;
      border-radius: var(--radius-md);
      margin: 10px 0;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .task-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .task-item .k { font-size: 11px; color: var(--text-2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .task-item .v { font-size: 13px; font-weight: 600; }

    .tuong-tac {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .tt-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
    }
    .tt-btn:hover { background: var(--border); color: var(--text); }
    .tt-btn.on { background: #FEE2E2; color: #DC2626; border-color: #FECACA; }
    .tt-btn .tim-icon svg { fill: none; transition: fill .15s; }
    .tt-btn.on .tim-icon svg { fill: currentColor; }

    /* Comments */
    .bl-wrap { margin-top: 10px; display: grid; gap: 8px; }
    .bl {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .bl-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .bl-ten { font-size: 13px; font-weight: 700; }
    .bl-time { font-size: 11px; color: var(--text-2); }
    .bl-nd { margin-top: 6px; font-size: 13px; line-height: 1.65; }
    .da-sua { font-size: 11px; color: var(--text-2); margin-left: 5px; }

    .form-bl { display: grid; gap: 8px; margin-top: 10px; }
    .form-bl-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ══════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════ */
    .nut-chinh {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      padding: 0 18px;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
    }
    .nut-chinh:hover { background: var(--accent-2); }
    .nut-phu {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
    }
    .nut-phu:hover { background: var(--surface-2); }
    .nut-gui { height: 38px; padding: 0 16px; border-radius: var(--radius-md); }
    .nut-more {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-2);
      display: grid;
      place-items: center;
    }
    .nut-more:hover { background: var(--surface-2); border-color: var(--border); color: var(--text); }
    .nut-tep {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      display: grid;
      place-items: center;
    }
    .nut-tep:hover { background: var(--border); color: var(--text); }

    /* ══════════════════════════════════════════
       FORM INPUTS
    ══════════════════════════════════════════ */
    .o {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }
    .o:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    textarea.o { height: auto; min-height: 100px; padding: 12px 14px; resize: vertical; line-height: 1.6; }
    .truong { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .nhom-o { display: grid; gap: 14px; }

    .mat-khau-wrap { position: relative; }
    .mat-khau-wrap .o { padding-right: 70px; }
    .nut-mat-khau {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 600;
    }
    .nut-mat-khau:hover { background: var(--border); }

    /* ══════════════════════════════════════════
       RICH TEXT EDITOR
    ══════════════════════════════════════════ */
    .rt-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      overflow: hidden;
    }
    .rt-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .rt-compose { display: grid; gap: 0; }
    .rt-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-wrap: wrap;
    }
    .rt-toolbar button {
      min-width: 34px; height: 34px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .rt-toolbar button:hover { background: var(--surface-2); }
    .rt-toolbar button.on { background: var(--accent-bg); border-color: #93C5FD; color: var(--accent); }
    .rt-editor {
      min-height: 130px;
      padding: 14px;
      outline: none;
      line-height: 1.7;
      font-size: 14px;
      background: var(--surface);
    }
    .rt-editor[data-placeholder]:empty:before { content: attr(data-placeholder); color: var(--text-2); }
    .rt-editor.comment { min-height: 88px; }
    .rt-editor p { margin: .4em 0; }
    .rt-editor ul, .rt-editor ol { padding-left: 22px; margin: .4em 0; }
    .rt-editor img { display: block; max-width: 100%; height: auto; border-radius: var(--radius-md); margin: 10px 0; border: 1px solid var(--border); }
    .rt-inline-preview { padding: 0 12px 12px; }
    .rt-inline-preview:empty { display: none; }

    /* ══════════════════════════════════════════
       FILTER DROPDOWNS
    ══════════════════════════════════════════ */
    .loc-item { position: relative; }
    .loc-trigger {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      outline: none;
    }
    .loc-trigger:hover, .loc-trigger:focus { border-color: var(--accent); }
    .loc-trigger .tao-loc-trigger-text { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; overflow: hidden; }
    .loc-trigger .tao-loc-trigger-text span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .loc-popup {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 35;
      width: 280px;
      max-width: min(280px, calc(100vw - 48px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 12px;
    }
    .loc-popup-title { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .loc-popup-list { display: grid; gap: 3px; }
    .loc-popup-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      font-size: 13px;
    }
    .loc-popup-btn:hover, .loc-popup-btn.on { background: var(--surface-2); border-color: var(--border); }
    .loc-popup-btn.on { color: var(--accent); font-weight: 600; }
    .loc-popup-divider { height: 1px; background: var(--border); margin: 8px 0; }

    .loc-date-grid { display: grid; gap: 8px; }
    .loc-date-field { display: grid; gap: 4px; }
    .loc-date-input {
      height: 40px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    .loc-date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

    .loc-nhanh { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .loc-nhanh button {
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 12px;
    }
    .loc-nhanh button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .loc-nhanh button:hover:not(.on) { background: var(--border); }

    .loc-clear {
      height: 40px;
      padding: 0 16px;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .loc-clear:hover { background: var(--accent-2); }

    /* Creator recipient picker */
    .tao-loc-wrap { display: grid; gap: 8px; }
    .tao-loc-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      margin-bottom: 8px;
    }
    .tao-loc-search input { border: none; outline: none; background: transparent; width: 100%; font-size: 13px; }
    .nguoi-nhan-empty {
      padding: 10px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      text-align: center;
      font-size: 13px;
    }

    /* ══════════════════════════════════════════
       DROPDOWNS / MENUS
    ══════════════════════════════════════════ */
    .hanh-dong-wrap { position: relative; display: flex; align-items: center; }
    .menu-noi-dung {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      padding: 5px;
      min-width: 130px;
      display: none;
      z-index: 20;
    }
    .menu-noi-dung.mo { display: block; }
    .menu-noi-dung button {
      width: 100%;
      text-align: left;
      padding: 9px 12px;

      color: var(--text);

    .menu-wrap { position: relative; }
    .menu {
      position: absolute;

      border-top: 1px solid var(--border);

    .tep-list { display: grid; gap: 6px; margin-top: 10px; }

    /* ══════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════ */
    .modal-nen {

       MISC

    .mention-list { display: grid; gap: 3px; max-height: 180px; overflow: auto; }
    .mention-item {
      width: 100%;

    .auth-form h2 { font-size: 24px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 4px; }

       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 1100px) {

    }
  </style>
</head>

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
const KHOA = 'groupshare_clean_v1';

let giao_dien = {

/* ── Icons ── */
const ICON_ANH = `<svg viewBox="0 0 24 24"><rect x="3.75" y="5.25" width="16.5" height="13.5" rx="2.25"/><circle cx="9" cy="10" r="1.25"/><path d="M5.5 16l4.2-4.2a1 1 0 0 1 1.4 0L14 14.7"/><path d="M12.8 13.6l1.2-1.2a1 1 0 0 1 1.4 0l3.1 3.1"/></svg>`;

function thoi_gian_iso(){ return new Date().toISOString(); }
function lay_ngay_iso_tu_chuoi(text){ const m=String(text||'').match(/(\d{2})\/(\d{2})(?:\/(\d{4}))?/); if(!m) return ''; const nam=m[3]||String(new Date().getFullYear()); return `${nam}-${m[2]}-${m[1]}`; }
function lay_ngay_tu_iso(iso){ if(!iso) return ''; const d=new Date(iso); if(Number.isNaN(d.getTime())) return ''; return d.toISOString().slice(0,10); }
function lay_moc_thoi_gian(item){ return item?.created_at||(item?.thoi_gian?lay_ngay_iso_tu_chuoi(item.thoi_gian):''); }
function du_lieu_hop_le_theo_ngay(item,tu_ngay,den_ngay){ const ngay=lay_ngay_tu_iso(lay_moc_thoi_gian(item))||lay_moc_thoi_gian(item); if(!tu_ngay&&!den_ngay) return true; if(!ngay) return false; if(tu_ngay&&ngay<tu_ngay) return false; if(den_ngay&&ngay>den_ngay) return false; return true; }

function id_moi(ds){ return ds.length?Math.max(...ds.map(x=>x.id))+1:1; }
function dinh_dang_kich_thuoc(bytes){ if(!bytes) return ''; const don_vi=['B','KB','MB','GB']; let i=0,n=bytes; while(n>=1024&&i<don_vi.length-1){n/=1024;i++;} return `${n.toFixed(n>=10||i===0?0:1)} ${don_vi[i]}`; }
function bo_ky_tu_nguy_hiem(ten){ return String(ten||'').replace(/[<>:"\|?*]+/g,'').trim()||'tep'; }
function escape_html(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function escape_attr_js(s){ return String(s??'').replaceAll('\\','\\\\').replaceAll("'","\'").replaceAll('\n',' '); }

function lay_text_tu_html(html){ const d=document.createElement('div'); d.innerHTML=sanitize_html(html||''); return (d.textContent||'').replace(/ /g,' ').trim(); }

function sanitize_html(html){
  const t=document.createElement('template');
  t.innerHTML=String(html||'');
  const ok=new Set(['P','BR','B','STRONG','I','EM','U','UL','OL','LI','A','IMG','DIV','SPAN']);
  const walk=(node)=>{
    Array.from(node.children).forEach(el=>{
      if(!ok.has(el.tagName)){ const p=el.parentNode; while(el.firstChild) p.insertBefore(el.firstChild,el); p.removeChild(el); return; }
      Array.from(el.attributes).forEach(attr=>{
        const n=attr.name.toLowerCase();
        if(el.tagName==='A'){ if(!['href','target','rel'].includes(n)) el.removeAttribute(attr.name); }
        else if(el.tagName==='IMG'){ if(!['src','alt'].includes(n)) el.removeAttribute(attr.name); }
        else if(el.tagName==='SPAN'){ if(!['class','data-mention'].includes(n)) el.removeAttribute(attr.name); }
        else el.removeAttribute(attr.name);
      });
      if(el.tagName==='A'){ const h=el.getAttribute('href')||''; if(!/^https?:/i.test(h)) el.removeAttribute('href'); el.setAttribute('target','_blank'); el.setAttribute('rel','noopener noreferrer'); }
      if(el.tagName==='IMG'){ const s=el.getAttribute('src')||''; if(!s.startsWith('data:image/')) el.remove(); }
      if(el.tagName==='SPAN'){ if(el.getAttribute('class')!=='mention-chip') el.removeAttribute('class'); if(!el.dataset.mention) el.removeAttribute('data-mention'); }
      walk(el);
    });
  };
  walk(t.content);
  return t.innerHTML.replace(/<div>/g,'<p>').replace(/<\/div>/g,'</p>').trim();
}

  du_lieu.nguoi_dung=du_lieu.nguoi_dung.filter(n=>n.ten_dang_nhap!==u.ten_dang_nhap);
  du_lieu.thanh_vien=du_lieu.thanh_vien.filter(tv=>tv.ten_dang_nhap!==u.ten_dang_nhap);
  du_lieu.loi_moi=du_lieu.loi_moi.filter(l=>l.nguoi_gui!==u.ten_dang_nhap&&l.nguoi_nhan!==u.ten_dang_nhap);

function luu_selection_editor(editorId){ const sel=window.getSelection(); if(!sel||!sel.rangeCount) return; giao_dien.lua_chon_editor[editorId]=sel.getRangeAt(0).cloneRange(); }
function khoi_phuc_selection_editor(editorId){ const r=giao_dien.lua_chon_editor[editorId]; const e=document.getElementById(editorId); if(!e) return; e.focus(); const s=window.getSelection(); s.removeAllRanges(); if(r) s.addRange(r); }
function dong_bo_rich_text(editorId){
  const editor=document.getElementById(editorId); if(!editor) return;
  const muc=editor.dataset.model,khoa=editor.dataset.key,html=sanitize_html(editor.innerHTML);
  if(muc==='tao'){ giao_dien.tao_nhap[khoa]=lay_text_tu_html(html); giao_dien.tao_nhap[`${khoa}_html`]=html; }
  else if(muc==='bl_tam'){ const t=lay_du_lieu_binh_luan_tam(Number(editor.dataset.id)); t[khoa]=lay_text_tu_html(html); t[`${khoa}_html`]=html; }
  else if(muc==='sua_bai'){ const t=lay_sua_bai_tam(Number(editor.dataset.id)); t[khoa]=lay_text_tu_html(html); t[`${khoa}_html`]=html; }
  else if(muc==='sua_bl'){ const t=lay_sua_bl_tam(Number(editor.dataset.id)); t[khoa]=lay_text_tu_html(html); t[`${khoa}_html`]=html; }
  cap_nhat_trang_thai_toolbar(editorId); cap_nhat_popup_mention(editorId);
}
function lenh_rich_text(editorId,lenh,gia_tri=null){ khoi_phuc_selection_editor(editorId); document.execCommand(lenh,false,gia_tri); dong_bo_rich_text(editorId); luu_selection_editor(editorId); }

async function chen_anh_vao_editor(editorId,input){
  const files=Array.from(input.files||[]).filter(f=>(f.type||'').startsWith('image/')); if(!files.length) return;
  khoi_phuc_selection_editor(editorId);
  for(const file of files){ const data=await doc_file(file); document.execCommand('insertHTML',false,`<p><img src="${data.du_lieu}" alt="${escape_html(file.name)}"></p>`); }
  input.value=''; dong_bo_rich_text(editorId); luu_selection_editor(editorId);
}
function cap_nhat_trang_thai_toolbar(editorId){
  const editor=document.getElementById(editorId); if(!editor) return;
  const wrap=editor.closest('.rt-wrap'); if(!wrap) return;
  ['bold','italic','underline'].forEach(fmt=>{ const btn=wrap.querySelector(`[data-format="${fmt}"]`); if(!btn) return; let on=false; try{on=document.queryCommandState(fmt);}catch{} btn.classList.toggle('on',!!on); });
}
function lay_text_truoc_con_tro(editor){
  const sel=window.getSelection(); if(!sel||!sel.rangeCount) return '';
  const r=sel.getRangeAt(0).cloneRange(); r.selectNodeContents(editor); r.setEnd(sel.anchorNode,sel.anchorOffset);
  const d=document.createElement('div'); d.appendChild(r.cloneContents()); return d.textContent||'';
}

function du_lieu_thanh_vien_mention(query=''){ const q=String(query||'').trim().toLowerCase(); return du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').map(t=>t.ten_dang_nhap).filter(td=>{ if(!q) return true; return lay_ten(td).toLowerCase().includes(q)||td.toLowerCase().includes(q); }); }
function render_popup_mention(editorId){
  const popup=document.getElementById(`mention_popup_${editorId}`); const list=document.getElementById(`mention_list_${editorId}`);
  if(!popup||!list) return;
  if(!giao_dien.mention.mo||giao_dien.mention.editorId!==editorId||!giao_dien.mention.items.length){ popup.classList.remove('mo'); list.innerHTML=''; return; }
  popup.classList.add('mo');
  list.innerHTML=giao_dien.mention.items.map((tdl,idx)=>`<button type="button" class="mention-item ${idx===giao_dien.mention.index?'on':''}" onmousedown="chon_mention('${editorId}','${tdl}')"><div class="avatar" style="width:28px;height:28px;font-size:10px">${avatar_chu(lay_ten(tdl))}</div><span>${escape_html(lay_ten(tdl))}</span></button>`).join('');

function cap_nhat_popup_mention(editorId){
  const editor=document.getElementById(editorId); if(!editor||editor.dataset.disableMention==='1') return;
  const text=lay_text_truoc_con_tro(editor); const idx=text.lastIndexOf('@');
  if(idx===-1||text.slice(idx-1,idx).match(/\S/)){ an_popup_mention(); return; }
  const q=text.slice(idx+1); const items=du_lieu_thanh_vien_mention(q);
  if(!items.length){ an_popup_mention(); return; }
  giao_dien.mention={mo:true,editorId,query:q,items,index:0}; render_popup_mention(editorId);
}
function xu_ly_phim_editor(editorId,e){
  if(!giao_dien.mention.mo||giao_dien.mention.editorId!==editorId) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); giao_dien.mention.index=Math.min(giao_dien.mention.index+1,giao_dien.mention.items.length-1); render_popup_mention(editorId); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); giao_dien.mention.index=Math.max(giao_dien.mention.index-1,0); render_popup_mention(editorId); }
  else if(e.key==='Enter'||e.key==='Tab'){ const sel=giao_dien.mention.items[giao_dien.mention.index]; if(sel){ e.preventDefault(); chon_mention(editorId,sel); } }
  else if(e.key==='Escape'){ an_popup_mention(); }
}
function chon_mention(editorId,tdl){
  const editor=document.getElementById(editorId); if(!editor) return;
  editor.focus();
  const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
  const r=sel.getRangeAt(0);
  let node=r.startContainer,offset=r.startOffset;
  const textContent=node.nodeType===Node.TEXT_NODE?node.textContent:'';
  const atIdx=textContent.lastIndexOf('@',offset-1);
  if(atIdx!==-1&&node.nodeType===Node.TEXT_NODE){
    r.setStart(node,atIdx); r.setEnd(node,offset); r.deleteContents();
    const chip=document.createElement('span'); chip.className='mention-chip'; chip.dataset.mention=tdl; chip.textContent=`@${lay_ten(tdl)}`; chip.contentEditable='false';
    r.insertNode(chip); r.setStartAfter(chip); r.collapse(true); sel.removeAllRanges(); sel.addRange(r);
    const sp=document.createTextNode('\u00A0'); r.insertNode(sp); r.setStartAfter(sp); r.collapse(true); sel.removeAllRanges(); sel.addRange(r);
  }
  an_popup_mention(); dong_bo_rich_text(editorId); luu_selection_editor(editorId);
}
function render_rich_text(editorId,model,key,value,placeholder,extra=''){
  const imgInputId=`${editorId}_img`;
  const dataId=model==='tao'?'':`data-id="${editorId.split('_').pop()}"`;
  const cssComment=model==='bl_tam'||model==='sua_bl'?'comment':'';
  const disableMention=editorId==='tao_noi_dung_editor';
  const mentionEvents=disableMention
    ?`onkeyup="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}')" onmouseup="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}')" onfocus="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}')"`
    :`onkeydown="xu_ly_phim_editor('${editorId}',event)" onkeyup="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}');cap_nhat_popup_mention('${editorId}')" onmouseup="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}');cap_nhat_popup_mention('${editorId}')" onfocus="luu_selection_editor('${editorId}');cap_nhat_trang_thai_toolbar('${editorId}');cap_nhat_popup_mention('${editorId}')"`;
  const mentionPopup=disableMention?'':`<div class="mention-popup" id="mention_popup_${editorId}" onclick="event.stopPropagation()"><div class="mention-title">Gợi ý thành viên</div><div class="mention-list" id="mention_list_${editorId}"></div></div>`;
  return `<div class="rt-wrap"><div class="rt-toolbar"><button type="button" data-format="bold" title="In đậm" onclick="lenh_rich_text('${editorId}','bold')"><b>B</b></button><button type="button" data-format="italic" title="In nghiêng" onclick="lenh_rich_text('${editorId}','italic')"><i>I</i></button><button type="button" data-format="underline" title="Gạch chân" onclick="lenh_rich_text('${editorId}','underline')"><u>U</u></button><button type="button" title="Chèn ảnh" onclick="mo_file_chen_anh('${editorId}','${imgInputId}')">${ICON_ANH}</button>${extra}</div><div id="${editorId}" class="rt-editor ${cssComment}" contenteditable="true" data-placeholder="${escape_html(placeholder)}" data-model="${model}" data-key="${key}" data-disable-mention="${disableMention?'1':'0'}" ${dataId} oninput="dong_bo_rich_text('${editorId}')" ${mentionEvents} onblur="setTimeout(()=>{cap_nhat_trang_thai_toolbar('${editorId}');an_popup_mention();},120)">${sanitize_html(value||'')}</div>${mentionPopup}<input class="an" id="${imgInputId}" type="file" accept="image/*" multiple onchange="chen_anh_vao_editor('${editorId}',this)"/></div>`;
}

function hop_le_theo_bo_loc_tim_kiem(bai){
  const q=giao_dien.tim.trim().toLowerCase();
  const ng=Array.isArray(giao_dien.tim_nguoi_gui)?giao_dien.tim_nguoi_gui:[];
  const nn=Array.isArray(giao_dien.tim_nguoi_nhan)?giao_dien.tim_nguoi_nhan:[];
  const tu=giao_dien.tim_ngay_tu; const den=giao_dien.tim_ngay_den;
  const bls=du_lieu.binh_luan.filter(bl=>bl.bai_id===bai.id);
  const baiText=!q||[bai.tieu_de,bai.noi_dung,lay_ten(bai.tac_gia),nhan_nguoi_nhan(bai)].join(' ').toLowerCase().includes(q);
  const blText=!!q&&bls.some(bl=>[bl.noi_dung,lay_ten(bl.tac_gia)].join(' ').toLowerCase().includes(q));
  const baiNguoi=!ng.length||ng.includes(bai.tac_gia);
  const blNguoi=ng.length?bls.some(bl=>ng.includes(bl.tac_gia)):false;
  const dsNR=lay_ds_nguoi_nhan(bai);
  const khopNR=!nn.length||nn.some(x=>x==='toan_nhom'?la_gui_toan_nhom(bai):dsNR.includes(x));
  const baiNgay=du_lieu_hop_le_theo_ngay(bai,tu,den);
  const blNgay=bls.some(bl=>du_lieu_hop_le_theo_ngay(bl,tu,den));
  return (!q||baiText||blText)&&(!ng.length||baiNguoi||blNguoi)&&(!nn.length||khopNR)&&(!(tu||den)||baiNgay||blNgay);
}
function lay_feed_hien_thi(u){
  let ds=du_lieu.bai_viet.filter(b=>{ if(la_truong_nhom(u.ten_dang_nhap)) return true; return la_gui_toan_nhom(b)||lay_ds_nguoi_nhan(b).includes(u.ten_dang_nhap)||b.tac_gia===u.ten_dang_nhap; });
  ds=ds.filter(hop_le_theo_bo_loc_tim_kiem);
  return ds.sort((a,b)=>new Date(lay_moc_thoi_gian(b)).getTime()-new Date(lay_moc_thoi_gian(a)).getTime()||b.id-a.id);
}

function co_loi_moi_cho(tdl){ return du_lieu.loi_moi.some(l=>l.nguoi_nhan===tdl&&l.trang_thai==='cho_phan_hoi'); }
function gui_loi_moi(tdl){ const u=nguoi_hien_tai(); if(du_lieu.loi_moi.some(l=>l.nguoi_nhan===tdl&&l.trang_thai==='cho_phan_hoi')) return toast('Đã có lời mời chờ phản hồi'); du_lieu.loi_moi.push({id:id_moi(du_lieu.loi_moi),nguoi_gui:u.ten_dang_nhap,nguoi_nhan:tdl,trang_thai:'cho_phan_hoi',thoi_gian:thoi_gian()}); du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao),nguoi_nhan:tdl,noi_dung:'Bạn có một lời mời vào nhóm.',da_doc:false}); luu_du_lieu();mo_drawer('moi_thanh_vien');toast('Đã gửi lời mời'); }
function phan_hoi_loi_moi(id,hanh_dong){ const l=du_lieu.loi_moi.find(x=>x.id===id); if(!l) return; l.trang_thai=hanh_dong; if(hanh_dong==='chap_nhan'&&!la_thanh_vien(l.nguoi_nhan)) du_lieu.thanh_vien.push({ten_dang_nhap:l.nguoi_nhan,vai_tro:'thanh_vien',trang_thai:'dang_hoat_dong'}); du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao),nguoi_nhan:l.nguoi_gui,noi_dung:`${lay_ten(l.nguoi_nhan)} ${hanh_dong==='chap_nhan'?'đã chấp nhận':'đã từ chối'} lời mời.`,da_doc:false}); luu_du_lieu();render();toast(hanh_dong==='chap_nhan'?'Đã tham gia nhóm':'Đã từ chối lời mời'); }
function trang_thai_loi_moi(v){ return {cho_phan_hoi:'Chờ phản hồi',chap_nhan:'Đã chấp nhận',tu_choi:'Đã từ chối'}[v]||v; }
function xoa_thanh_vien_khoi_nhom(tdl){ const u=nguoi_hien_tai(); if(!la_truong_nhom(u.ten_dang_nhap)) return; const tv=du_lieu.thanh_vien.find(x=>x.ten_dang_nhap===tdl&&x.trang_thai==='dang_hoat_dong'); if(!tv||tv.vai_tro==='truong_nhom') return; const ten=lay_ten(tdl); if(!confirm(`Xóa ${ten} khỏi nhóm?`)) return; tv.trang_thai='da_roi_nhom'; du_lieu.loi_moi=du_lieu.loi_moi.filter(l=>!(l.nguoi_nhan===tdl&&l.trang_thai==='cho_phan_hoi')); du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao),nguoi_nhan:tdl,noi_dung:'Bạn đã bị xóa khỏi nhóm.',da_doc:false}); luu_du_lieu(); if(giao_dien.drawer?.kieu==='thanh_vien') mo_drawer('thanh_vien'); else render(); toast('Đã xóa thành viên'); }
function cap_nhat_tim_thanh_vien(value){ giao_dien.tim_thanh_vien=value; if(giao_dien.drawer?.kieu==='thanh_vien') mo_drawer('thanh_vien'); }
function doc_het_thong_bao(){ const u=nguoi_hien_tai(); du_lieu.thong_bao.forEach(t=>{if(t.nguoi_nhan===u.ten_dang_nhap) t.da_doc=true;}); luu_du_lieu();render(); }
function chuyen_trang_thai_luu_tru(){ du_lieu.nhom.trang_thai=du_lieu.nhom.trang_thai==='dang_hoat_dong'?'luu_tru':'dang_hoat_dong'; luu_du_lieu();render();toast(du_lieu.nhom.trang_thai==='luu_tru'?'Đã lưu trữ nhóm':'Đã mở lại nhóm'); }
function tao_nhom_moi(){ toast('Tính năng tạo nhóm sẽ sớm ra mắt!'); }

/* ── Drawer ── */
function mo_drawer(kieu,id){ if(kieu==='binh_luan'&&(!giao_dien.drawer||giao_dien.drawer.kieu!==kieu||giao_dien.drawer.id!==id)) dat_lai_loc_binh_luan(); if(kieu==='thanh_vien'&&(!giao_dien.drawer||giao_dien.drawer.kieu!==kieu)) giao_dien.tim_thanh_vien=''; giao_dien.drawer={kieu,id}; giao_dien.menu_hanh_dong=null; document.getElementById('drawer_back').classList.add('mo'); const drawer=document.getElementById('drawer'); drawer.classList.add('mo'); drawer.innerHTML=render_drawer(kieu,id); }
function dong_drawer(){ giao_dien.drawer=null;giao_dien.tim_thanh_vien='';document.getElementById('drawer_back').classList.remove('mo');document.getElementById('drawer').classList.remove('mo'); }

function render_drawer(kieu,id){
  if(kieu==='thanh_vien'){
    const u=nguoi_hien_tai(); const laTruong=la_truong_nhom(u.ten_dang_nhap);
    const q=String(giao_dien.tim_thanh_vien||'').trim().toLowerCase();
    const ds=du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').filter(tv=>{ if(!q) return true; const ten=lay_ten(tv.ten_dang_nhap).toLowerCase(); return ten.includes(q)||tv.ten_dang_nhap.toLowerCase().includes(q); });
    return `<div class="modal-head"><div><h2>Thành viên (${du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').length})</h2></div><button class="nut-phu" onclick="dong_drawer()">✕</button></div>
      ${laTruong?`<div style="margin-top:14px"><button class="nut-chinh" style="width:100%" onclick="mo_drawer('moi_thanh_vien')"><span class="icon-inline">${ICON_NGUOI}</span> Mời thành viên</button></div>`:''}
      <div class="tim" style="margin-top:12px;min-width:0;width:100%"><span class="icon-inline">${ICON_TIM_KIEM}</span><input placeholder="Tìm kiếm..." value="${escape_html(giao_dien.tim_thanh_vien||'')}" oninput="cap_nhat_tim_thanh_vien(this.value)"/></div>
      <div class="list" style="margin-top:14px">${ds.map(tv=>`<div class="dong"><div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1"><div class="avatar" style="width:36px;height:36px;font-size:11px">${avatar_chu(lay_ten(tv.ten_dang_nhap))}</div><div style="min-width:0"><div style="font-weight:600;font-size:13px">${escape_html(lay_ten(tv.ten_dang_nhap))}</div><div class="mini">${tv.vai_tro==='truong_nhom'?'Trưởng nhóm':'Thành viên'}</div></div></div>${laTruong&&tv.vai_tro!=='truong_nhom'?`<button class="nut-phu" style="height:34px;padding:0 12px;font-size:12px" onclick="xoa_thanh_vien_khoi_nhom('${tv.ten_dang_nhap}')">Xóa</button>`:''}</div>`).join('')||'<div class="mini">Không tìm thấy.</div>'}</div>`;
  }
  if(kieu==='thong_bao'){
    const u=nguoi_hien_tai(); const ds=du_lieu.thong_bao.filter(t=>t.nguoi_nhan===u.ten_dang_nhap).reverse();
    return `<div class="modal-head"><div><h2>Thông báo</h2></div><button class="nut-phu" onclick="dong_drawer()">✕</button></div>
      <div class="list" style="margin-top:16px">${ds.map(tb=>`<div class="loi-moi"><div style="display:flex;align-items:center;gap:8px;justify-content:space-between"><span class="mini" style="color:${tb.da_doc?'var(--text-2)':'var(--accent)'};font-weight:${tb.da_doc?'400':'600'}">${tb.da_doc?'Đã đọc':'● Mới'}</span></div><div style="margin-top:5px;font-size:13px">${escape_html(tb.noi_dung)}</div></div>`).join('')||'<div class="mini" style="padding:12px">Chưa có thông báo.</div>'}</div>`;
  }
  if(kieu==='binh_luan'){
    const bai=du_lieu.bai_viet.find(b=>b.id===id); const ds=lay_binh_luan_hien_thi(id); const u=nguoi_hien_tai();
    return `<div class="modal-head"><div><h2 style="font-size:17px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escape_html(bai.tieu_de||'Bình luận')}</h2></div><button class="nut-phu" onclick="dong_drawer()">✕</button></div>
      <div class="drawer-filter-bar"><div class="drawer-filter-label">Lọc theo:</div><div class="bl-loc-wrap"><button type="button" class="bl-loc-trigger" onclick="toggle_bl_loc(event)"><span class="bl-loc-trigger-text"><span class="icon-inline">${ICON_NGUOI}</span><span>${escape_html(nhan_bl_nguoi_gui_dang_chon())}</span></span><span class="icon-inline">${ICON_CHEVRON}</span></button>${render_popup_bl_nguoi_gui(id)}</div></div>
      <div class="drawer-comment-body"><div class="drawer-comment-list">${ds.map(bl=>render_bl(bl,u)).join('')||'<div class="drawer-comment-empty">Chưa có bình luận phù hợp.</div>'}</div></div>
      ${du_lieu.nhom.trang_thai==='dang_hoat_dong'?`<div class="form-bl drawer-comment-form"><div class="rt-compose">${render_rich_text(`bl_${id}`,'bl_tam','noi_dung',lay_du_lieu_binh_luan_tam(id).noi_dung_html||'','Viết bình luận... gõ @ để nhắc tên',`<button type="button" class="nut-tep" onclick="document.getElementById('bl_tep_${id}').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="bl_tep_${id}" type="file" multiple onchange="them_file_binh_luan(${id},this,'tep')"/>`)}<div class="rt-inline-preview">${render_preview_binh_luan(id)}</div></div><div class="mini" style="margin-top:4px;padding:0 2px">Gõ @ để mention thành viên</div><div class="form-bl-actions" style="margin-top:8px"><button type="button" class="nut-chinh nut-gui" onclick="them_binh_luan(${id});mo_drawer('binh_luan',${id})">Gửi</button></div></div>`:''}`;
  }
  if(kieu==='moi_thanh_vien'){
    const ds=du_lieu.nguoi_dung.filter(n=>!la_thanh_vien(n.ten_dang_nhap));
    return `<div class="modal-head"><div><h2>Gửi lời mời</h2></div><button class="nut-phu" onclick="dong_drawer()">✕</button></div>
      <div class="list" style="margin-top:16px">${ds.map(n=>`<div class="dong"><div><div style="font-weight:600;font-size:13px">${escape_html(n.ho_ten)}</div><div class="mini">@${escape_html(n.ten_dang_nhap)}</div></div><button class="nut-chinh" style="height:34px;padding:0 14px;font-size:12px" onclick="gui_loi_moi('${n.ten_dang_nhap}')">Mời</button></div>`).join('')||'<div class="mini" style="padding:12px">Không còn người dùng nào để mời.</div>'}</div>`;
  }
  if(kieu==='loi_moi_gui'){
    const ds=du_lieu.loi_moi.slice().reverse();
    return `<div class="modal-head"><div><h2>Lời mời đã gửi</h2></div><button class="nut-phu" onclick="dong_drawer()">✕</button></div>
      <div class="list" style="margin-top:16px">${ds.map(l=>`<div class="loi-moi"><div style="font-size:13px;font-weight:600">${escape_html(lay_ten(l.nguoi_nhan))}</div><div class="mini" style="margin-top:3px">${trang_thai_loi_moi(l.trang_thai)} · ${l.thoi_gian}</div></div>`).join('')||'<div class="mini" style="padding:12px">Chưa có lời mời nào.</div>'}</div>`;
  }
  return '';
}

/* ══════════════════════════════════════════
   RENDER FUNCTIONS
══════════════════════════════════════════ */
function render(){
  const u=nguoi_hien_tai();
  const modal=document.getElementById('modal_tao');
  const drawer=document.getElementById('drawer');
  const drawerBack=document.getElementById('drawer_back');
  const modalDangMo=modal.classList.contains('mo');
  const drawerDangMo=drawer.classList.contains('mo')&&giao_dien.drawer;
  const conTrongNhom=u?la_thanh_vien(u.ten_dang_nhap):false;
  document.getElementById('ung_dung').innerHTML=!u?man_hinh_auth():(conTrongNhom?man_hinh_chinh(u):man_hinh_khong_con_trong_nhom(u));
  if(!u||!conTrongNhom){ giao_dien.drawer=null;modal.classList.remove('mo');drawer.classList.remove('mo');drawerBack.classList.remove('mo');return; }
  if(modalDangMo){ modal.classList.add('mo');render_form_tao(); }else modal.classList.remove('mo');
  if(drawerDangMo){ drawer.classList.add('mo');drawerBack.classList.add('mo');drawer.innerHTML=render_drawer(giao_dien.drawer.kieu,giao_dien.drawer.id); }else{ drawer.classList.remove('mo');drawerBack.classList.remove('mo'); }
}
function render_feed(){
  const u=nguoi_hien_tai(); const root=document.getElementById('ung_dung'); if(!u||!root) return render();
  const main=root.querySelector('main.giua'); if(!main) return render();
  const ds=lay_feed_hien_thi(u); const feed=main.querySelector('section.feed');
  if(feed) feed.innerHTML=ds.map(b=>render_bai(b,u)).join('')||'<div class="the" style="text-align:center;color:var(--text-2);padding:32px">Chưa có nội dung nào.</div>';
}

              <input placeholder="Tìm kiếm bài viết, nội dung..." value="${escape_html(giao_dien.tim)}" oninput="cap_nhat_tim_feed(this.value)"/>
            </div>
          </div>
          <div class="filter-row">
            <div class="loc-item"><button type="button" class="loc-trigger" onclick="toggle_loc_menu('nguoi_gui',event)"><span class="tao-loc-trigger-text"><span class="icon-inline">${ICON_NGUOI}</span><span>${escape_html(nhan_nguoi_gui_dang_chon())}</span></span><span class="icon-inline">${ICON_CHEVRON}</span></button>${render_popup_nguoi_gui()}</div>
            <div class="loc-item"><button type="button" class="loc-trigger" onclick="toggle_loc_menu('nguoi_nhan',event)"><span class="tao-loc-trigger-text"><span class="icon-inline">${ICON_NGUOI}</span><span>${escape_html(nhan_nguoi_nhan_dang_chon())}</span></span><span class="icon-inline">${ICON_CHEVRON}</span></button>${render_popup_nguoi_nhan()}</div>
            <div class="loc-item"><button type="button" class="loc-trigger" onclick="toggle_loc_menu('ngay_gui',event)"><span class="tao-loc-trigger-text"><span class="icon-inline">${ICON_LICH}</span><span>${escape_html(nhan_ngay_gui_dang_chon())}</span></span><span class="icon-inline">${ICON_CHEVRON}</span></button>${render_popup_ngay_gui()}</div>
            <button class="loc-clear" onclick="xoa_bo_loc_tim_kiem()">Xóa bộ lọc</button>
          </div>
        </div>
      </div>

      <div class="feed-wrap">
        ${!dang_hoat_dong?'<div class="banner-luu-tru">⚠️ Nhóm đang ở chế độ chỉ đọc — không thể đăng hoặc bình luận.</div>':''}
        ${co_loi_moi_cho(u.ten_dang_nhap)?khung_loi_moi_nhan(u.ten_dang_nhap):''}
        <section class="feed">${ds.map(b=>render_bai(b,u)).join('')||'<div class="the" style="text-align:center;color:var(--text-2);padding:32px 20px"><div style="font-size:32px;margin-bottom:8px">📭</div><div style="font-weight:600">Chưa có nội dung nào</div><div class="mini" style="margin-top:4px">Hãy tạo bài viết đầu tiên!</div></div>'}</section>
      </div>
    </main>
  </div></div>`;
}

function khung_loi_moi_nhan(tdl){
  const ds=du_lieu.loi_moi.filter(l=>l.nguoi_nhan===tdl&&l.trang_thai==='cho_phan_hoi');
  if(!ds.length) return '';
  return `<div class="invite-card">${ds.map(l=>`<div style="${ds.length>1?'margin-bottom:12px':''}"><h3>Lời mời tham gia nhóm</h3><div class="mini" style="margin-top:2px">Từ ${escape_html(lay_ten(l.nguoi_gui))} · ${l.thoi_gian}</div><div class="invite-actions"><button class="nut-chinh" style="height:36px;font-size:13px" onclick="phan_hoi_loi_moi(${l.id},'chap_nhan')">Chấp nhận</button><button class="nut-phu" style="height:36px;font-size:13px" onclick="phan_hoi_loi_moi(${l.id},'tu_choi')">Từ chối</button></div></div>`).join('')}</div>`;
}

function render_bai(b,u){
  const bls=du_lieu.binh_luan.filter(x=>x.bai_id===b.id);
  const la_tac_gia=b.tac_gia===u.ten_dang_nhap;
  const da_thich=b.thich.includes(u.ten_dang_nhap);
  return `<article class="the">
    <div class="the-head">
      <div class="meta">
        <div class="avatar">${avatar_chu(lay_ten(b.tac_gia))}</div>
        <div>
          <div class="ten">${escape_html(lay_ten(b.tac_gia))}</div>
          <div class="sub">${b.thoi_gian}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span class="nhan">${la_gui_toan_nhom(b)?'Toàn nhóm':`${lay_ds_nguoi_nhan(b).length} người nhận`}</span>
        ${!b.dang_sua?render_menu_hanh_dong('bai',b.id,la_tac_gia):''}
      </div>
    </div>
    ${b.dang_sua?`${(()=>{const t=lay_sua_bai_tam(b.id);return `<div style="margin-top:14px;display:grid;gap:10px">
      <input class="o" id="sua_tieu_de_${b.id}" value="${escape_html(t.tieu_de||'')}" placeholder="Tiêu đề..." oninput="cap_nhat_sua_bai(${b.id},'tieu_de',this.value)"/>
      ${render_rich_text(`sua_bai_noi_dung_${b.id}`,'sua_bai','noi_dung',t.noi_dung_html||'','Viết nội dung...')}
      <div><div style="display:flex;gap:6px;margin-bottom:8px"><button type="button" class="nut-tep" onclick="document.getElementById('sua_bai_tep_${b.id}').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="sua_bai_tep_${b.id}" type="file" multiple onchange="them_file_sua_bai(${b.id},this,'tep')"/></div>${render_preview_sua_bai(b.id)}</div>
      <div style="display:flex;gap:8px"><button class="nut-chinh" onclick="luu_sua_bai(${b.id})">Lưu</button><button class="nut-phu" onclick="huy_sua_bai(${b.id})">Hủy</button></div>
    </div>`;})()}`:`
    ${b.tieu_de?`<div class="post-title">${escape_html(b.tieu_de)}</div>`:''}
    ${render_noi_dung_html(b,'noi-dung-bai')}
    ${render_dinh_kem(b.anh_dinh_kem||[],b.tep_dinh_kem||[],`bai_${b.id}`)}`}
    ${la_gui_toan_nhom(b)||b.deadline?`<div class="task-box"><div class="task-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="task-item"><div class="k">Người nhận</div><div class="v">${escape_html(nhan_nguoi_nhan(b))}</div></div>
      <div class="task-item"><div class="k">Deadline</div><div class="v" style="color:${b.deadline?'var(--accent)':'var(--text-2)'}">${b.deadline||'—'}</div></div>
    </div></div>`:''}
    <div class="tuong-tac">
      <button class="tt-btn ${da_thich?'on':''}" onclick="thich_bai(${b.id})"><span class="icon-inline tim-icon">${ICON_TIM}</span><span>${b.thich.length}</span></button>
      <button class="tt-btn" onclick="mo_drawer('binh_luan',${b.id})"><span class="icon-inline">${ICON_BINH_LUAN}</span><span>${bls.length} bình luận</span></button>
    </div>
  </article>`;
}

function cap_nhat_sua_bai(id,truong,gia_tri){ const t=lay_sua_bai_tam(id); t[truong]=gia_tri; }

function render_bl(bl,u){
  const la_tac_gia=bl.tac_gia===u.ten_dang_nhap;
  return `<div class="bl">
    <div class="bl-top">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" style="width:28px;height:28px;font-size:10px">${avatar_chu(lay_ten(bl.tac_gia))}</div>
        <span class="bl-ten">${escape_html(lay_ten(bl.tac_gia))}</span>
        <span class="bl-time">${bl.thoi_gian}${bl.da_sua?' · <span class="da-sua">đã sửa</span>':''}</span>
      </div>
      ${la_tac_gia?render_menu_hanh_dong('bl',bl.id,true):''}
    </div>
    ${bl.dang_sua?`${(()=>{const t=lay_sua_bl_tam(bl.id);return `<div style="margin-top:8px;display:grid;gap:8px">${render_rich_text(`sua_bl_${bl.id}`,'sua_bl','noi_dung',t.noi_dung_html||'','Sửa bình luận...',`<button type="button" class="nut-tep" onclick="document.getElementById('sua_bl_tep_${bl.id}').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="sua_bl_tep_${bl.id}" type="file" multiple onchange="them_file_sua_binh_luan(${bl.id},this,'tep')"/>`)}<div class="rt-inline-preview">${render_preview_sua_binh_luan(bl.id)}</div><div style="display:flex;gap:6px"><button class="nut-chinh nut-gui" onclick="luu_sua_binh_luan(${bl.id})">Lưu</button><button class="nut-phu nut-gui" onclick="huy_sua_binh_luan(${bl.id})">Hủy</button></div></div>`;})()}`:`${render_noi_dung_html(bl,'bl-nd')}${render_dinh_kem(bl.anh_dinh_kem||[],bl.tep_dinh_kem||[],`bl_${bl.id}`)}`}
  </div>`;
}

/* ── Global click handler ── */
document.addEventListener('click',(e)=>{
  let rerender=false;
  if(giao_dien.menu_hanh_dong&&!e.target.closest('.hanh-dong-wrap')){ giao_dien.menu_hanh_dong=null;rerender=true; }
  if(giao_dien.menu_tep&&!e.target.closest('.tep-menu-wrap')){ giao_dien.menu_tep=null;rerender=true; }
  if(giao_dien.menu_tao_nguoi_nhan&&!e.target.closest('.tao-loc-wrap')){ giao_dien.menu_tao_nguoi_nhan=false; const f=document.getElementById('form_tao'); if(f&&document.getElementById('modal_tao')?.classList.contains('mo')) render_form_tao(); }
  if(giao_dien.menu_loc&&!e.target.closest('.loc-item')){ giao_dien.menu_loc=null;giao_dien.mo_goi_y_ngay=false;rerender=true; }
  if(giao_dien.mo_bl_loc&&!e.target.closest('.bl-loc-wrap')){ giao_dien.mo_bl_loc=false;rerender=true; }
  if(giao_dien.mention.mo&&!e.target.closest('.rt-wrap')){ giao_dien.mention={mo:false,editorId:null,query:'',items:[],index:0}; document.querySelectorAll('.mention-popup.mo').forEach(p=>p.classList.remove('mo')); }
  if(rerender) render();
});
document.addEventListener('click',(e)=>{
  const chip=e.target.closest('.rt-editor .mention-chip');
  if(chip){ e.preventDefault();e.stopPropagation(); const editor=chip.closest('.rt-editor'); chip.remove(); if(editor){editor.focus();dong_bo_rich_text(editor.id);luu_selection_editor(editor.id);} return; }
  const img=e.target.closest('.noi-dung-bai img,.bl-nd img'); if(img) mo_xem_anh(img.src);
});

function toast(noi_dung){ const w=document.getElementById('toast_wrap'); if(!w) return; const d=document.createElement('div'); d.className='toast'; d.textContent=noi_dung; w.appendChild(d); setTimeout(()=>d.remove(),2400); }

render();
</script>
</body>
</html>
