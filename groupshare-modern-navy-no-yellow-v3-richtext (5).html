<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupShare</title>
  <style>
    :root{
      --nen:#F4F5F7;
      --the:#FFFFFF;
      --the-2:#F7F8FA;
      --vien:#E5E7EB;
      --chu:#111827;
      --phu:#6B7280;
      --dam:#1F2937;
      --nhan:#E8EEF8;
      --xanh:#1E3A5F;
      --nut:#1E3A5F;
      --nut-hover:#243e66;
      --do:#1E3A5F;
      --vang:#F1F3F5;
      --bong:0 10px 30px rgba(17,24,39,.05);
      --bo:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--nen);color:var(--chu)}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:none;transition:background .18s ease,color .18s ease,border-color .18s ease,box-shadow .18s ease}
    a{transition:background .18s ease,color .18s ease,border-color .18s ease}
    .ten,.bl-ten,.task-item .v{letter-spacing:-.01em}
    .an{display:none!important}
    .ung-dung{min-height:100vh}
    .khung{max-width:1440px;margin:0 auto;padding:18px}
    .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .auth-card{width:min(100%,920px);display:grid;grid-template-columns:1.1fr .9fr;background:#FFFFFF;border:1px solid var(--vien);box-shadow:var(--bong);border-radius:22px;overflow:hidden}
    .auth-visual{background:linear-gradient(180deg,#F8F9FB,#F1F3F6);padding:36px;display:flex;flex-direction:column;justify-content:space-between}
    .auth-visual .logo{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:0 8px 22px rgba(17,24,39,.05)}
    .auth-visual h1{font-size:36px;line-height:1.08;margin:24px 0 12px;font-weight:700;letter-spacing:-.04em;color:var(--chu)}
    .auth-visual p{margin:0;color:var(--phu);font-size:15px;line-height:1.7;max-width:420px}
    .auth-mini{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px}
    .auth-form{padding:34px;background:#FFFFFF}
    .phan-doi{display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content;margin-bottom:28px}
    .phan-doi button{padding:10px 18px;border-radius:999px;background:transparent;color:var(--phu)}
    .phan-doi .on{background:#fff;color:var(--chu);box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .nhom-o{display:grid;gap:14px}
    .truong{font-size:13px;color:var(--phu);margin-bottom:8px;font-weight:500}
    .o{width:100%;padding:16px 18px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:var(--chu);outline:none}
    .o:focus{border-color:#9DB4CF;box-shadow:0 0 0 4px rgba(30,58,95,.10)}
    .nut-chinh{background:var(--nut);color:#fff;padding:15px 18px;border-radius:10px;font-weight:600}
    .nut-chinh:hover{background:var(--nut-hover)}
    .goi-y{margin-top:18px;padding:14px 16px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px;line-height:1.7}
.mat-khau-wrap{position:relative}.mat-khau-wrap .o{padding-right:88px}.nut-mat-khau{position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:8px 12px;border-radius:12px;background:#F3F4F6;color:var(--dam);font-size:13px}.auth-note{color:var(--phu);font-size:13px;line-height:1.6}.auth-form h2{margin:0 0 6px;font-size:28px;letter-spacing:-.03em}.auth-form .sub-auth{margin:0 0 20px;color:var(--phu);font-size:14px}
    .bo-cuc{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;min-height:calc(100vh - 36px)}
    .side{background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;box-shadow:var(--bong);padding:16px;display:flex;flex-direction:column;gap:12px}
    .brand{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:0 8px 22px rgba(17,24,39,.05)}
    .nav-doc{display:grid;gap:10px;margin-top:6px}
    .nav-item{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:13px 14px;border-radius:14px;background:#fff;border:1px solid transparent;color:var(--chu);transition:background .18s ease,border-color .18s ease}
    .nav-item.on,.nav-item:hover{background:var(--the-2);border-color:var(--vien)}
    .nav-so{display:inline-flex;min-width:22px;height:22px;padding:0 7px;align-items:center;justify-content:center;border-radius:999px;background:var(--the-2);font-size:12px;color:var(--chu)}
    .avatar{width:44px;height:44px;border-radius:50%;background:#1E3A5F;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .giua,.phai{background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;box-shadow:var(--bong)}
    .giua{overflow:hidden}
    .header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--vien);min-height:88px}
    .header.gon{min-height:auto;padding:18px 22px 8px;border-bottom:none}
    .header-left{display:flex;align-items:center;gap:12px}
    .trang-thai{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:var(--the-2);color:var(--xanh);font-weight:600}
    .cham{width:8px;height:8px;border-radius:50%;background:#1E3A5F}
    .actions{display:flex;gap:10px;align-items:center}
    .nut-phu{padding:12px 16px;border-radius:14px;background:var(--the-2);color:var(--chu);border:1px solid transparent}
    .menu-wrap{position:relative}
    .menu{position:absolute;top:56px;right:0;background:#fff;border:1px solid var(--vien);border-radius:10px;box-shadow:var(--bong);padding:8px;min-width:190px;display:none;z-index:15}
    .menu.mo{display:block}
    .menu button{width:100%;text-align:left;padding:12px 14px;border-radius:12px;background:transparent;color:var(--chu)}
    .menu button:hover{background:var(--the-2)}
    .tao-box-gon{padding:18px 20px;gap:14px;margin-top:0}.tao-box-gon .tao-cta{min-height:56px}.tao-box-gon .tao-tabs{margin-top:12px}.noi-dung{padding-top:22px}.thanh-cong-cu{margin-top:18px}
.banner-luu-tru{margin:18px 22px 0;padding:14px 16px;border-radius:14px;background:var(--the-2);color:#475569;border:1px solid var(--vien)}
    .noi-dung{padding:18px 22px 26px}
    .tao-box{display:flex;gap:14px;align-items:flex-start;padding:18px;border-radius:18px;background:linear-gradient(180deg,#FFFFFF,#FAFBFC);border:1px solid var(--vien)}
    .tao-main{flex:1}
    .tao-cta{width:100%;text-align:left;background:#fff;border:1px solid var(--vien);border-radius:14px;padding:16px 18px;color:var(--phu)}
    .tao-tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .tao-tabs button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--chu);border:1px solid var(--vien)}
    .thanh-cong-cu{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chips button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--phu);border:1px solid var(--vien)}
    .chips .on{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
    .tim{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:#fff;border:1px solid var(--vien);min-width:280px}
    .tim input{border:none;outline:none;background:transparent;width:100%}
    .feed{margin-top:18px;display:grid;gap:14px}
    .the{background:#fff;border:1px solid var(--vien);border-radius:18px;padding:20px 20px 16px}
    .the-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .meta{display:flex;align-items:center;gap:12px}
    .ten{font-weight:650}
    .sub{font-size:13px;color:var(--phu);margin-top:3px}
    .nhan{display:inline-flex;padding:7px 10px;border-radius:999px;font-size:12px;background:var(--the-2);color:#1E3A5F}
    .noi-dung-bai{margin:14px 0 0;line-height:1.75;color:var(--chu)}
    .noi-dung-bai p,.bl-nd p{margin:.45em 0}
    .noi-dung-bai ul,.noi-dung-bai ol,.bl-nd ul,.bl-nd ol{padding-left:22px;margin:.45em 0}
    .noi-dung-bai img,.bl-nd img{display:block;max-width:100%;height:auto;border-radius:12px;margin:12px 0;border:1px solid var(--vien)}
    .task-box{margin-top:14px;background:var(--the-2);border:1px solid var(--vien);border-radius:16px;padding:14px}
    .task-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .task-item .k{font-size:12px;color:var(--phu);margin-bottom:6px}.task-item .v{font-weight:600}
    .anh-gia{margin-top:14px;height:220px;border-radius:22px;background:linear-gradient(135deg,#EEF2F7,#E5EBF4);display:grid;place-items:center;color:#5B677A}
    .tuong-tac{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--vien)}
    .tt-btn{padding:9px 12px;border-radius:999px;background:var(--the-2);color:var(--chu);border:1px solid transparent}
    .tt-btn.on{background:#EEF2F7;color:#1E3A5F;border-color:#D9E1EE}
    .tt-btn.nho{padding:8px 10px;font-size:13px}
    .tt-btn,.tim{display:flex;align-items:center}
    .tt-btn{gap:8px}
    .icon-inline{display:inline-flex;align-items:center;justify-content:center;color:currentColor}
    .icon-inline svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .bl-wrap{margin-top:12px;display:grid;gap:10px}
    .bl{background:#fff;border:1px solid var(--vien);border-radius:14px;padding:12px 14px}
    .bl-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .bl-ten{font-size:14px;font-weight:600}.bl-time{font-size:12px;color:var(--phu)}
    .bl-nd{margin-top:6px;line-height:1.65;color:var(--chu)}
    .da-sua{font-size:12px;color:var(--phu);margin-left:6px}
    .form-bl{display:grid;gap:10px;margin-top:10px}
    .form-bl-actions{display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
    .icon-tep{width:38px;height:38px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:#24324a;display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer}
    .icon-tep:hover{background:#F3F4F6}
    .icon-tep svg{width:18px;height:18px;display:block;stroke:currentColor!important;fill:none!important;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .icon-tep svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .nut-gui{height:42px;padding:0 16px;border-radius:12px}
    .phai{display:none}
    .card-side{background:#fff;border:1px solid var(--vien);border-radius:18px;padding:16px}
    .card-side h3{margin:0 0 12px;font-size:17px}
    .list{display:grid;gap:10px}
    .dong{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}
    .mini{font-size:13px;color:var(--phu)}
.side-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-header{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-main{display:grid;gap:12px}.side-strip{display:flex;align-items:center;justify-content:space-between;gap:10px}.side-list{display:grid;gap:8px}.side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}.side-item .avatar{width:34px;height:34px;font-size:11px}.side-label{font-size:12px;color:var(--phu);margin-top:2px}.side-count{font-size:24px;font-weight:700;letter-spacing:-.03em}.side-menu{display:flex;align-items:center;gap:8px}.card-side h4{margin:0 0 10px;font-size:15px}.nho-gon .dong{padding:10px 12px}
    .link-nho{background:none;padding:0;color:var(--phu)}
    .hanh-dong-wrap{position:relative;display:flex;align-items:center}
    .nut-more{width:36px;height:36px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--phu);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nut-more:hover{background:var(--the-2);color:var(--chu)}
    .nut-more svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .menu-noi-dung{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--vien);border-radius:12px;box-shadow:var(--bong);padding:6px;min-width:140px;display:none;z-index:20}
    .menu-noi-dung.mo{display:block}
    .menu-noi-dung button{width:100%;text-align:left;padding:10px 12px;border-radius:10px;background:transparent;color:var(--chu)}
    .menu-noi-dung button:hover{background:var(--the-2)}
    .loi-moi{padding:12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}
    .toast-wrap{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:60}
    .toast{padding:12px 16px;border-radius:14px;background:#1E3A5F;color:#fff;box-shadow:var(--bong)}
    .modal-nen{position:fixed;inset:0;background:rgba(17,24,39,.22);display:none;place-items:center;padding:18px;z-index:50}
    .modal-nen.mo{display:grid}
    .modal{width:min(100%,760px);max-height:90vh;overflow:auto;background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;padding:22px;box-shadow:var(--bong)}
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .modal h2{margin:0;font-size:22px}.modal p{margin:6px 0 0;color:var(--phu)}
    .seg{margin-top:18px;display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content}
    .seg button{padding:10px 16px;border-radius:999px;background:transparent;color:var(--phu)}
    .seg .on{background:#fff;color:var(--chu)}
    .form{display:grid;gap:14px;margin-top:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form label{display:grid;gap:8px;color:var(--phu)}
    textarea.o{min-height:120px;resize:vertical}
    .foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .danger{background:#f4e5e3;color:var(--do)}
    .drawer{position:fixed;top:0;right:-440px;width:min(100%,440px);height:100vh;background:#FFFFFF;border-left:1px solid var(--vien);box-shadow:var(--bong);z-index:55;padding:22px;transition:right .24s ease;overflow-y:auto;overscroll-behavior:contain}
    .drawer.mo{right:0}
    .drawer-back{position:fixed;inset:0;background:rgba(17,24,39,.18);display:none;z-index:54}.drawer-back.mo{display:block}
    .muted{color:var(--phu)}

    .tep-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .nut-tep{width:40px;height:40px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:#24324a;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nut-tep:hover{background:#F3F4F6}
    .nut-tep svg{width:18px;height:18px;display:block;stroke:currentColor!important;fill:none!important;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .preview-list{display:grid;gap:8px;margin-top:8px}
    .tep-actions-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
    .rt-wrap{border:1px solid var(--vien);border-radius:16px;background:var(--the);overflow:hidden}
    .rt-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--vien);background:#FBFBFC}
    .rt-toolbar button{min-width:34px;height:34px;padding:0 10px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:var(--chu);font-weight:600}
    .rt-editor{min-height:140px;padding:15px 16px;outline:none;line-height:1.7;background:#fff}
    .rt-editor[data-placeholder]:empty:before{content:attr(data-placeholder);color:var(--phu)}
    .rt-editor p{margin:.45em 0}
    .rt-editor ul,.rt-editor ol{padding-left:22px;margin:.45em 0}
    .rt-editor img{display:block;max-width:100%;height:auto;border-radius:12px;margin:12px 0;border:1px solid var(--vien)}
    .rt-editor.comment{min-height:96px}
    .preview-file{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:12px;background:var(--the);border:1px solid var(--vien);font-size:14px}
    .preview-file span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .anh-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px}
    .anh-item{overflow:hidden;border-radius:14px;border:1px solid var(--vien);background:var(--the-2)}
    .anh-item img{display:block;width:100%;height:140px;object-fit:cover}
    .tep-list{display:grid;gap:8px;margin-top:12px}
    .tep-link{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien);color:var(--chu);text-decoration:none}
    .tep-link-main{min-width:0;display:grid;gap:4px}
    .tep-link-main span{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tep-link-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .tep-mini-btn{padding:7px 10px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:var(--chu);text-decoration:none;cursor:pointer}
    .tep-mini-btn:hover{background:var(--the-2)}
    .anh-item img,.noi-dung-bai img,.bl-nd img{cursor:pointer}
    .preview-file{align-items:flex-start}
    .preview-file-info{min-width:0;display:grid;gap:4px;flex:1}
    .preview-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .preview-file-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .preview-file-actions .link-nho,.preview-file-actions .tep-mini-btn{font-size:13px}
    .preview-file-actions .link-nho{padding:7px 10px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:var(--chu)}
    .xem-anh-modal{position:fixed;inset:0;background:rgba(17,24,39,.76);display:none;align-items:center;justify-content:center;padding:24px;z-index:80}
    .xem-anh-modal.mo{display:flex}
    .xem-anh-card{max-width:min(96vw,1100px);max-height:92vh;display:grid;gap:12px}
    .xem-anh-top{display:flex;justify-content:flex-end}
    .xem-anh-top .nut-phu{background:rgba(255,255,255,.96)}
    .xem-anh-card img{max-width:100%;max-height:calc(92vh - 64px);display:block;border-radius:18px;background:#fff}
    @media (max-width: 1100px){.bo-cuc{grid-template-columns:1fr}.side{display:none}.tim{min-width:unset;width:100%}.task-grid,.grid-2,.auth-card{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="ung-dung" id="ung_dung"></div>
<div class="modal-nen" id="modal_tao">
  <div class="modal">
    <div class="modal-head">
      <div><h2>Tạo nội dung</h2></div>
      <button type="button" class="nut-phu" onclick="dong_modal_tao()">Đóng</button>
    </div>
    <div class="seg" id="seg_tao">
      <button class="on" onclick="chuyen_kieu_tao('bai_viet')">Bài viết</button>
      <button onclick="chuyen_kieu_tao('task')">Task</button>
    </div>
    <div class="form" id="form_tao"></div>
    <div class="foot">
      <button type="button" class="nut-phu" onclick="dong_modal_tao()">Hủy</button>
      <button type="button" class="nut-chinh" onclick="luu_noi_dung_moi()">Lưu</button>
    </div>
  </div>
</div>
<div class="drawer-back" id="drawer_back" onclick="dong_drawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="xem-anh-modal" id="xem_anh_modal" onclick="dong_xem_anh()"><div class="xem-anh-card" onclick="event.stopPropagation()"><div class="xem-anh-top"><button type="button" class="nut-phu" onclick="dong_xem_anh()">Đóng</button></div><img id="xem_anh_img" alt="Xem ảnh" /></div></div>
<div class="toast-wrap" id="toast_wrap"></div>
<script>

function dinh_dang_kich_thuoc(bytes){
  if(!bytes) return '';
  const don_vi = ['B','KB','MB','GB'];
  let i = 0, n = bytes;
  while(n >= 1024 && i < don_vi.length-1){ n /= 1024; i++; }
  return `${n.toFixed(n >= 10 || i===0 ? 0 : 1)} ${don_vi[i]}`;
}

}

function sanitize_html(html){
  const template = document.createElement('template');
  template.innerHTML = String(html || '');
  const hop_le = new Set(['P','BR','B','STRONG','I','EM','U','UL','OL','LI','A','IMG','DIV']);
  const walk = (node) => {
    Array.from(node.children).forEach(el => {
      if(!hop_le.has(el.tagName)){
        const parent = el.parentNode;
        while(el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
        return;
      }
      Array.from(el.attributes).forEach(attr => {
        const ten = attr.name.toLowerCase();
        if(el.tagName === 'A'){
          if(!['href','target','rel'].includes(ten)) el.removeAttribute(attr.name);
        }else if(el.tagName === 'IMG'){
          if(!['src','alt'].includes(ten)) el.removeAttribute(attr.name);
        }else{
          el.removeAttribute(attr.name);
        }
      });
      if(el.tagName === 'A'){
        const href = el.getAttribute('href') || '';
        if(!/^https?:/i.test(href)) el.removeAttribute('href');
        el.setAttribute('target','_blank');
        el.setAttribute('rel','noopener noreferrer');
      }
      if(el.tagName === 'IMG'){
        const src = el.getAttribute('src') || '';
        if(!src.startsWith('data:image/')) el.remove();
      }
      walk(el);
    });
  };
  walk(template.content);
  return template.innerHTML.replace(/<div>/g,'<p>').replace(/<\/div>/g,'</p>').trim();
}

function luu_selection_editor(editorId){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return;
  giao_dien.lua_chon_editor[editorId] = sel.getRangeAt(0).cloneRange();
}
function khoi_phuc_selection_editor(editorId){
  const range = giao_dien.lua_chon_editor[editorId];
  const editor = document.getElementById(editorId);
  if(!editor) return;
  editor.focus();
  const sel = window.getSelection();
  sel.removeAllRanges();
  if(range) sel.addRange(range);
}
function dong_bo_rich_text(editorId){
  const editor = document.getElementById(editorId);
  if(!editor) return;
  const muc = editor.dataset.model;
  const khoa = editor.dataset.key;
  const html = sanitize_html(editor.innerHTML);
  if(muc === 'tao'){
    giao_dien.tao_nhap[khoa] = lay_text_tu_html(html);
    giao_dien.tao_nhap[`${khoa}_html`] = html;
    return;
  }
  if(muc === 'bl_tam'){
    const tam = lay_du_lieu_binh_luan_tam(Number(editor.dataset.id));
    tam[khoa] = lay_text_tu_html(html);
    tam[`${khoa}_html`] = html;
    return;
  }
  if(muc === 'sua_bai'){
    const tam = lay_sua_bai_tam(Number(editor.dataset.id));
    tam[khoa] = lay_text_tu_html(html);
    tam[`${khoa}_html`] = html;
    return;
  }
  if(muc === 'sua_bl'){
    const tam = lay_sua_bl_tam(Number(editor.dataset.id));
    tam[khoa] = lay_text_tu_html(html);
    tam[`${khoa}_html`] = html;
  }
}

async function chen_anh_vao_editor(editorId, input){
  const files = Array.from(input.files || []).filter(f => (f.type || '').startsWith('image/'));
  if(!files.length) return;
  khoi_phuc_selection_editor(editorId);
  for(const file of files){
    const data = await doc_file(file);
    document.execCommand('insertHTML', false, `<p><img src="${data.du_lieu}" alt="${escape_html(file.name)}"></p>`);
  }
  input.value = '';
  dong_bo_rich_text(editorId);
  luu_selection_editor(editorId);
}

async function doc_file(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve({ ten:file.name, loai:file.type, kich_thuoc:file.size, du_lieu:reader.result });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  const khu_tep = tep.length ? `<div class="tep-list">${tep.map(t=>`<div class="tep-link"><div class="tep-link-main"><span>${nhan_dinh_kem('tep', t.ten)}</span><small>${dinh_dang_kich_thuoc(t.kich_thuoc)}</small></div><div class="tep-link-actions"><button type="button" class="tep-mini-btn" onclick="mo_tep('${escape_attr_js(t.du_lieu)}', '${escape_attr_js(t.ten)}')">Xem</button><button type="button" class="tep-mini-btn" onclick="tai_tep('${escape_attr_js(t.du_lieu)}', '${escape_attr_js(t.ten)}')">Tải</button></div></div>`).join('')}</div>` : '';
  return khu_anh + khu_tep;
}

function dang_mo_menu_hanh_dong(loai, id){
  return giao_dien.menu_hanh_dong && giao_dien.menu_hanh_dong.loai===loai && giao_dien.menu_hanh_dong.id===id;
}
function toggle_menu_hanh_dong(loai, id, event){
  if(event) event.stopPropagation();
  if(dang_mo_menu_hanh_dong(loai, id)) giao_dien.menu_hanh_dong = null;
  else giao_dien.menu_hanh_dong = { loai, id };
  render();
}
function dong_menu_hanh_dong(){
  if(!giao_dien.menu_hanh_dong) return;
  giao_dien.menu_hanh_dong = null;
  render();
}
function render_menu_hanh_dong(loai, id, la_tac_gia){
  if(!la_tac_gia) return '';
  const sua = loai === 'bai' ? `bat_dau_sua_bai(${id})` : `bat_dau_sua_binh_luan(${id})`;
  const xoa = loai === 'bai' ? `xoa_bai(${id})` : `xoa_binh_luan(${id})`;
  return `<div class="hanh-dong-wrap" onclick="event.stopPropagation()"><button type="button" class="nut-more" onclick="toggle_menu_hanh_dong('${loai}', ${id}, event)">${ICON_BA_CHAM}</button><div class="menu-noi-dung ${dang_mo_menu_hanh_dong(loai, id)?'mo':''}"><button type="button" onclick="${sua}">Sửa</button><button type="button" onclick="${xoa}">Xóa</button></div></div>`;
}


function dang_nhap(){
  const ten = document.getElementById('dn_ten').value.trim();
  const mk = document.getElementById('dn_mk').value;
  const u = du_lieu.nguoi_dung.find(x=>x.ten_dang_nhap===ten && x.mat_khau===mk);
  if(!u){ toast('Sai tên đăng nhập hoặc mật khẩu'); return; }
  localStorage.setItem(PHIEN, u.ten_dang_nhap);
  render();
}
function dang_ky(){
  const ten = document.getElementById('dk_ten').value.trim();
  const ho_ten = document.getElementById('dk_ho_ten').value.trim();
  const mk = document.getElementById('dk_mk').value;
  if(!ten || !ho_ten || !mk){ toast('Nhập đầy đủ thông tin'); return; }
  if(du_lieu.nguoi_dung.some(x=>x.ten_dang_nhap===ten)){ toast('Tên đăng nhập đã tồn tại'); return; }
  du_lieu.nguoi_dung.push({ten_dang_nhap:ten, ho_ten, mat_khau:mk});
  luu_du_lieu();
  toast('Đăng ký thành công');
  giao_dien.che_do_auth='dang_nhap';
  render();
}
function dang_xuat(){ localStorage.removeItem(PHIEN); giao_dien.mo_menu=false; render(); }
function doi_hien_mat_khau(id, nut){ const o = document.getElementById(id); if(!o) return; const dangAn = o.type === 'password'; o.type = dangAn ? 'text' : 'password'; nut.textContent = dangAn ? 'Ẩn' : 'Hiện'; }

function render(){
  const u = nguoi_hien_tai();
  const modal = document.getElementById('modal_tao');
  const drawer = document.getElementById('drawer');
  const drawerBack = document.getElementById('drawer_back');
  const modalDangMo = modal.classList.contains('mo');
  const drawerDangMo = drawer.classList.contains('mo') && giao_dien.drawer;
  document.getElementById('ung_dung').innerHTML = u ? man_hinh_chinh(u) : man_hinh_auth();
  if(modalDangMo){
    modal.classList.add('mo');
    render_form_tao();
  }else{
    modal.classList.remove('mo');
  }
  if(drawerDangMo){
    drawer.classList.add('mo');
    drawerBack.classList.add('mo');
    drawer.innerHTML = render_drawer(giao_dien.drawer.kieu, giao_dien.drawer.id);
  }else{
    drawer.classList.remove('mo');
    drawerBack.classList.remove('mo');
  }
}

      </div>`; })()}` : `${render_noi_dung_html(bl, 'bl-nd')}${render_dinh_kem(bl.anh_dinh_kem || [], bl.tep_dinh_kem || [])}`}

function lay_feed_hien_thi(u){
  let ds = du_lieu.bai_viet.filter(b=>{
    if(la_truong_nhom(u.ten_dang_nhap)) return true;
    if(b.quyen==='toan_nhom') return la_thanh_vien(u.ten_dang_nhap);
    if(b.quyen==='chi_truong_nhom') return b.tac_gia===u.ten_dang_nhap;
    return true;
  });
  if(giao_dien.bo_loc==='bai_viet') ds = ds.filter(b=>b.kieu==='bai_viet');
  if(giao_dien.bo_loc==='task') ds = ds.filter(b=>b.kieu==='task');
  if(giao_dien.bo_loc==='cua_toi') ds = ds.filter(b=>b.tac_gia===u.ten_dang_nhap || b.nguoi_nhan===u.ten_dang_nhap);
  if(giao_dien.tim.trim()){
    const q = giao_dien.tim.toLowerCase();
    ds = ds.filter(b => [b.tieu_de,b.noi_dung,lay_ten(b.tac_gia)].join(' ').toLowerCase().includes(q));
  }
  return ds.sort((a,b)=>b.id-a.id);
}
function doi_bo_loc(v){ giao_dien.bo_loc=v; render(); }
function bat_menu(){ giao_dien.mo_menu=!giao_dien.mo_menu; render(); }

function mo_modal_tao(kieu='bai_viet'){ giao_dien.kieu_tao = kieu; giao_dien.tao_anh=[]; giao_dien.tao_tep=[]; dat_lai_nhap_tao(); document.getElementById('modal_tao').classList.add('mo'); render_form_tao(); }
function dong_modal_tao(){ giao_dien.tao_anh=[]; giao_dien.tao_tep=[]; dat_lai_nhap_tao(); document.getElementById('modal_tao').classList.remove('mo'); }
function chuyen_kieu_tao(kieu){ giao_dien.kieu_tao=kieu; render_form_tao(); }
function render_form_tao(){
  const seg = document.getElementById('seg_tao'); if(!seg) return;
  seg.querySelectorAll('button')[0].classList.toggle('on',giao_dien.kieu_tao==='bai_viet');
  seg.querySelectorAll('button')[1].classList.toggle('on',giao_dien.kieu_tao==='task');
  const form = document.getElementById('form_tao');
  if(giao_dien.kieu_tao==='bai_viet'){
    form.innerHTML = `
      <label>Tiêu đề (không bắt buộc)<input class="o" id="tao_tieu_de" value="${escape_html(giao_dien.tao_nhap.tieu_de||'')}" oninput="cap_nhat_nhap_tao('tieu_de', this.value)" /></label>
      <label>Nội dung</label>
      ${render_rich_text('tao_noi_dung_editor', 'tao', 'noi_dung', giao_dien.tao_nhap.noi_dung_html || '', 'Bạn đang nghĩ gì?', `<button type="button" class="nut-tep" onclick="document.getElementById('tao_tep').click()" title="Thêm tệp" aria-label="Thêm tệp">${ICON_TEP}</button><input class="an" id="tao_tep" type="file" multiple onchange="them_file_tao(this, 'tep')" />`)}
      <label>Quyền xem<select class="o" id="tao_quyen" onchange="cap_nhat_nhap_tao('quyen', this.value)"><option value="toan_nhom" ${giao_dien.tao_nhap.quyen==='toan_nhom'?'selected':''}>Toàn nhóm</option><option value="chi_truong_nhom" ${giao_dien.tao_nhap.quyen==='chi_truong_nhom'?'selected':''}>Chỉ trưởng nhóm</option></select></label>
      <div>${render_preview_tao()}</div>`;
  } else {
    const thanh_vien = du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong' && t.ten_dang_nhap!==du_lieu.nhom.truong_nhom);
    form.innerHTML = `
      <label>Tiêu đề task<input class="o" id="tao_tieu_de" value="${escape_html(giao_dien.tao_nhap.tieu_de||'')}" oninput="cap_nhat_nhap_tao('tieu_de', this.value)" /></label>
      <label>Mô tả</label>
      ${render_rich_text('tao_noi_dung_editor', 'tao', 'noi_dung', giao_dien.tao_nhap.noi_dung_html || '', 'Mô tả task', `<button type="button" class="nut-tep" onclick="document.getElementById('tao_tep').click()" title="Thêm tệp" aria-label="Thêm tệp">${ICON_TEP}</button><input class="an" id="tao_tep" type="file" multiple onchange="them_file_tao(this, 'tep')" />`)}
      <div class="grid-2">
        <label>Người nhận<select class="o" id="tao_nguoi_nhan" onchange="cap_nhat_nhap_tao('nguoi_nhan', this.value)">${thanh_vien.map(t=>`<option value="${t.ten_dang_nhap}" ${giao_dien.tao_nhap.nguoi_nhan===t.ten_dang_nhap?'selected':''}>${lay_ten(t.ten_dang_nhap)}</option>`).join('')}</select></label>
        <label>Deadline<input class="o" id="tao_deadline" type="date" value="${escape_html(giao_dien.tao_nhap.deadline||'')}" oninput="cap_nhat_nhap_tao('deadline', this.value)" /></label>
      </div>
      <div>${render_preview_tao()}</div>`;
  }
}
function luu_noi_dung_moi(){
  const u = nguoi_hien_tai();
  if(du_lieu.nhom.trang_thai!=='dang_hoat_dong') return toast('Nhóm đang ở chế độ chỉ đọc');
  const tieu_de = (giao_dien.tao_nhap.tieu_de||'').trim();
  const noi_dung_html = sanitize_html(giao_dien.tao_nhap.noi_dung_html || chuyen_text_thanh_html(giao_dien.tao_nhap.noi_dung||''));
  const noi_dung = lay_text_tu_html(noi_dung_html);
  const co_dinh_kem = giao_dien.tao_tep.length || /<img|<a|<ul|<ol|<p|<br/i.test(noi_dung_html);
  if(giao_dien.kieu_tao==='bai_viet'){
    if(!noi_dung && !co_dinh_kem) return toast('Viết nội dung hoặc đính kèm trước khi đăng');
  } else {
    if(!tieu_de) return toast('Nhập tiêu đề task');
    if(!noi_dung && !co_dinh_kem) return toast('Nhập mô tả hoặc đính kèm trước khi tạo task');
  }
  const moi = { id:id_moi(du_lieu.bai_viet), kieu:giao_dien.kieu_tao, tieu_de, noi_dung, noi_dung_html, tac_gia:u.ten_dang_nhap, quyen:'toan_nhom', thich:[], da_sua:false, thoi_gian:thoi_gian(), anh_dinh_kem:[...giao_dien.tao_anh], tep_dinh_kem:[...giao_dien.tao_tep] };
  if(giao_dien.kieu_tao==='bai_viet'){
    moi.quyen = giao_dien.tao_nhap.quyen || 'toan_nhom';
  } else {
    moi.nguoi_nhan = giao_dien.tao_nhap.nguoi_nhan || (du_lieu.thanh_vien.find(t=>t.trang_thai==='dang_hoat_dong' && t.ten_dang_nhap!==du_lieu.nhom.truong_nhom)||{}).ten_dang_nhap || '';
    moi.deadline = giao_dien.tao_nhap.deadline || ''; 
    moi.trang_thai = 'chua_lam';
    du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:moi.nguoi_nhan, noi_dung:'Bạn có một task mới.', da_doc:false});
  }
  du_lieu.bai_viet.push(moi); luu_du_lieu(); dong_modal_tao(); render(); toast('Đã tạo nội dung');
}

function thich_bai(id){ const u=nguoi_hien_tai(); const b=du_lieu.bai_viet.find(x=>x.id===id); const i=b.thich.indexOf(u.ten_dang_nhap); if(i>=0) b.thich.splice(i,1); else b.thich.push(u.ten_dang_nhap); luu_du_lieu(); render(); }
function them_binh_luan(bai_id){
  const u=nguoi_hien_tai(); if(du_lieu.nhom.trang_thai!=='dang_hoat_dong') return toast('Nhóm đang ở chế độ chỉ đọc');
  const tam = lay_du_lieu_binh_luan_tam(bai_id); const noi_dung_html = sanitize_html(tam.noi_dung_html || chuyen_text_thanh_html(tam.noi_dung||'')); const noi_dung=lay_text_tu_html(noi_dung_html);
  if(!noi_dung && !tam.tep.length && !/<img|<a|<ul|<ol|<p|<br/i.test(noi_dung_html)) return;
  du_lieu.binh_luan.push({id:id_moi(du_lieu.binh_luan), bai_id, tac_gia:u.ten_dang_nhap, noi_dung, noi_dung_html, da_sua:false, thoi_gian:thoi_gian(), anh_dinh_kem:[...tam.anh], tep_dinh_kem:[...tam.tep]});
  giao_dien.bl_tam[bai_id] = { noi_dung:'', noi_dung_html:'', anh:[], tep:[] };
  const bai = du_lieu.bai_viet.find(b=>b.id===bai_id); if(bai && bai.tac_gia!==u.ten_dang_nhap){ du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:bai.tac_gia, noi_dung:'Có bình luận mới vào bài của bạn.', da_doc:false}); }
  luu_du_lieu(); render();
}
function bat_dau_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; lay_sua_bai_tam(id); b.dang_sua=true; render(); }
function huy_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); b.dang_sua=false; delete giao_dien.sua_bai_tam[id]; render(); }
function luu_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; const tam = lay_sua_bai_tam(id); const noi_dung_html = sanitize_html(tam.noi_dung_html || chuyen_text_thanh_html(tam.noi_dung||'')); b.tieu_de=(tam.tieu_de||'').trim(); b.noi_dung=lay_text_tu_html(noi_dung_html); b.noi_dung_html=noi_dung_html; b.anh_dinh_kem=[...tam.anh]; b.tep_dinh_kem=[...tam.tep]; b.dang_sua=false; b.da_sua=true; delete giao_dien.sua_bai_tam[id]; luu_du_lieu(); render(); toast('Đã cập nhật bài viết'); }
function xoa_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; if(!confirm('Xóa bài viết này?')) return; du_lieu.bai_viet = du_lieu.bai_viet.filter(x=>x.id!==id); du_lieu.binh_luan = du_lieu.binh_luan.filter(x=>x.bai_id!==id); luu_du_lieu(); render(); toast('Đã xóa bài viết'); }
function bat_dau_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; lay_sua_bl_tam(id); bl.dang_sua=true; render(); }
function huy_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); bl.dang_sua=false; delete giao_dien.sua_bl_tam[id]; render(); }
function luu_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; const tam = lay_sua_bl_tam(id); const noi_dung_html = sanitize_html(tam.noi_dung_html || chuyen_text_thanh_html(tam.noi_dung||'')); bl.noi_dung=lay_text_tu_html(noi_dung_html); bl.noi_dung_html=noi_dung_html; bl.anh_dinh_kem=[...tam.anh]; bl.tep_dinh_kem=[...tam.tep]; bl.dang_sua=false; bl.da_sua=true; delete giao_dien.sua_bl_tam[id]; luu_du_lieu(); render(); toast('Đã cập nhật bình luận'); }
function xoa_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; if(!confirm('Xóa bình luận này?')) return; du_lieu.binh_luan = du_lieu.binh_luan.filter(x=>x.id!==id); luu_du_lieu(); render(); toast('Đã xóa bình luận'); }
function cap_nhat_task(id, trang_thai){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.nguoi_nhan!==nguoi_hien_tai().ten_dang_nhap) return; b.trang_thai=trang_thai; luu_du_lieu(); render(); toast('Đã cập nhật task'); }
function nhan_task(v){ return {chua_lam:'Chưa làm',dang_thuc_hien:'Đang thực hiện',hoan_thanh:'Hoàn thành'}[v] || v; }
function chuyen_trang_thai_luu_tru(){ du_lieu.nhom.trang_thai = du_lieu.nhom.trang_thai==='dang_hoat_dong' ? 'luu_tru' : 'dang_hoat_dong'; luu_du_lieu(); giao_dien.mo_menu=false; render(); toast(du_lieu.nhom.trang_thai==='luu_tru'?'Đã lưu trữ nhóm':'Đã mở lại nhóm'); }
function doc_het_thong_bao(){ const u=nguoi_hien_tai(); du_lieu.thong_bao.forEach(t=>{ if(t.nguoi_nhan===u.ten_dang_nhap) t.da_doc=true; }); luu_du_lieu(); render(); }

function mo_drawer(kieu, id){ giao_dien.drawer={kieu,id}; giao_dien.menu_hanh_dong=null; document.getElementById('drawer_back').classList.add('mo'); document.getElementById('drawer').classList.add('mo'); const drawer=document.getElementById('drawer'); drawer.innerHTML = render_drawer(kieu,id); }
function dong_drawer(){ giao_dien.drawer=null; document.getElementById('drawer_back').classList.remove('mo'); document.getElementById('drawer').classList.remove('mo'); }
function render_drawer(kieu,id){
  if(kieu==='thanh_vien'){
    return `<div class="modal-head"><div><h2>Thành viên</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').map(tv=>`<div class="dong"><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="width:38px;height:38px;font-size:11px">${avatar_chu(lay_ten(tv.ten_dang_nhap))}</div><div><div>${lay_ten(tv.ten_dang_nhap)}</div><div class="mini">${tv.vai_tro==='truong_nhom'?'Trưởng nhóm':'Thành viên'}</div></div></div></div>`).join('')}</div>`;
  }
  if(kieu==='thong_bao'){
    const u=nguoi_hien_tai(); const ds=du_lieu.thong_bao.filter(t=>t.nguoi_nhan===u.ten_dang_nhap);
    return `<div class="modal-head"><div><h2>Thông báo</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(tb=>`<div class="loi-moi"><div class="mini">${tb.da_doc?'Đã đọc':'Mới'}</div><div style="margin-top:6px">${tb.noi_dung}</div></div>`).join('') || '<div class="mini">Chưa có thông báo.</div>'}</div>`;
  }
  if(kieu==='binh_luan'){
    const bai = du_lieu.bai_viet.find(b=>b.id===id); const ds = du_lieu.binh_luan.filter(x=>x.bai_id===id); const u=nguoi_hien_tai();
    return `<div class="modal-head"><div><h2>${escape_html(bai.tieu_de||'Bình luận')}</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(bl=>render_bl(bl,u)).join('') || '<div class="mini">Chưa có bình luận.</div>'}</div>
      ${du_lieu.nhom.trang_thai==='dang_hoat_dong' ? `<div class="form-bl" style="margin-top:18px">${render_rich_text(`bl_${id}`, 'bl_tam', 'noi_dung', lay_du_lieu_binh_luan_tam(id).noi_dung_html || '', 'Viết bình luận', `<button type="button" class="nut-tep" onclick="document.getElementById('bl_tep_${id}').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="bl_tep_${id}" type="file" multiple onchange="them_file_binh_luan(${id}, this, 'tep')" />`)}<div class="form-bl-actions"><div>${render_preview_binh_luan(id)}</div><button type="button" class="nut-chinh nut-gui" onclick="them_binh_luan(${id}); mo_drawer('binh_luan', ${id})">Gửi</button></div></div>`:''}`;
  }
  if(kieu==='moi_thanh_vien'){
    const ds = du_lieu.nguoi_dung.filter(n=>!la_thanh_vien(n.ten_dang_nhap));
    return `<div class="modal-head"><div><h2>Gửi lời mời</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(n=>`<div class="dong"><div><div>${n.ho_ten}</div><div class="mini">@${n.ten_dang_nhap}</div></div><button class="nut-phu" onclick="gui_loi_moi('${n.ten_dang_nhap}')">Mời</button></div>`).join('') || '<div class="mini">Không còn người dùng nào để mời.</div>'}</div>`;
  }
  if(kieu==='loi_moi_gui'){
    const ds = du_lieu.loi_moi.slice().reverse();
    return `<div class="modal-head"><div><h2>Lời mời đã gửi</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(l=>`<div class="loi-moi"><div>${lay_ten(l.nguoi_nhan)}</div><div class="mini" style="margin-top:4px">${trang_thai_loi_moi(l.trang_thai)} · ${l.thoi_gian}</div></div>`).join('') || '<div class="mini">Chưa có lời mời nào.</div>'}</div>`;
  }
  return '';
}
function trang_thai_loi_moi(v){ return {cho_phan_hoi:'Chờ phản hồi',chap_nhan:'Đã chấp nhận',tu_choi:'Đã từ chối'}[v] || v; }
function gui_loi_moi(ten_dang_nhap){
  const u=nguoi_hien_tai();
  if(du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi')) return toast('Đã có lời mời chờ phản hồi');
  du_lieu.loi_moi.push({id:id_moi(du_lieu.loi_moi), nguoi_gui:u.ten_dang_nhap, nguoi_nhan:ten_dang_nhap, trang_thai:'cho_phan_hoi', thoi_gian:thoi_gian()});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:ten_dang_nhap, noi_dung:'Bạn có một lời mời vào nhóm.', da_doc:false});
  luu_du_lieu(); mo_drawer('moi_thanh_vien'); toast('Đã gửi lời mời');
}
function co_loi_moi_cho(ten_dang_nhap){ return du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi'); }
function phan_hoi_loi_moi(id, hanh_dong){
  const l=du_lieu.loi_moi.find(x=>x.id===id); if(!l) return;
  l.trang_thai = hanh_dong;
  if(hanh_dong==='chap_nhan' && !la_thanh_vien(l.nguoi_nhan)) du_lieu.thanh_vien.push({ten_dang_nhap:l.nguoi_nhan,vai_tro:'thanh_vien',trang_thai:'dang_hoat_dong'});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:l.nguoi_gui, noi_dung:`${lay_ten(l.nguoi_nhan)} ${hanh_dong==='chap_nhan'?'đã chấp nhận':'đã từ chối'} lời mời.`, da_doc:false});
  luu_du_lieu(); render(); toast(hanh_dong==='chap_nhan'?'Đã tham gia nhóm':'Đã từ chối lời mời');
}

function toast(noi_dung){ const wrap=document.getElementById('toast_wrap'); if(!wrap) return; const div=document.createElement('div'); div.className='toast'; div.textContent=noi_dung; wrap.appendChild(div); setTimeout(()=>div.remove(),2200); }
function escape_html(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function escape_attr_js(s){ return String(s??'').replaceAll('\\','\\\\').replaceAll("'", "\'").replaceAll('\n',' '); }

document.addEventListener('click', (e) => {
  if(giao_dien.menu_hanh_dong && !e.target.closest('.hanh-dong-wrap')){
    giao_dien.menu_hanh_dong = null;
    render();
  }
});

render();
document.addEventListener('click', (e)=>{
  const img = e.target.closest('.noi-dung-bai img, .bl-nd img');
  if(img) mo_xem_anh(img.src);
});
</script>
</body>
</html>
