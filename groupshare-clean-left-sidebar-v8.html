<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupShare</title>
  <style>
    :root{
      --nen:#f6f0e8;
      --the:#fffaf5;
      --the-2:#f3ece4;
      --vien:#e7dbcd;
      --chu:#2f2924;
      --phu:#7d6f62;
      --dam:#4a3b31;
      --nhan:#d6eadf;
      --xanh:#4f7f6f;
      --nut:#5a4639;
      --nut-hover:#4b3a30;
      --do:#a55353;
      --vang:#efe2d2;
      --bong:0 10px 30px rgba(74,59,49,.08);
      --bo:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#efe8df 0%, #f7f2ec 35%, #f5efe8 100%);color:var(--chu)}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:none}
    .an{display:none!important}
    .ung-dung{min-height:100vh}
    .khung{max-width:1440px;margin:0 auto;padding:18px}
    .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .auth-card{width:min(100%,920px);display:grid;grid-template-columns:1.1fr .9fr;background:rgba(255,250,245,.86);backdrop-filter:blur(8px);border:1px solid rgba(231,219,205,.9);box-shadow:var(--bong);border-radius:36px;overflow:hidden}
    .auth-visual{background:radial-gradient(circle at top left,#f6ede4,#ece1d5 55%,#e7dacb);padding:36px;display:flex;flex-direction:column;justify-content:space-between}
    .auth-visual .logo{width:56px;height:56px;border-radius:18px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:var(--bong)}
    .auth-visual h1{font-size:40px;line-height:1.06;margin:24px 0 12px;font-weight:700;letter-spacing:-.04em}
    .auth-visual p{margin:0;color:var(--phu);font-size:16px;line-height:1.7;max-width:420px}
    .auth-mini{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px}
    .auth-form{padding:34px;background:rgba(255,251,246,.9)}
    .phan-doi{display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content;margin-bottom:28px}
    .phan-doi button{padding:10px 18px;border-radius:999px;background:transparent;color:var(--phu)}
    .phan-doi .on{background:#fff;color:var(--chu);box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .nhom-o{display:grid;gap:14px}
    .truong{font-size:14px;color:var(--phu);margin-bottom:8px}
    .o{width:100%;padding:16px 18px;border-radius:18px;border:1px solid var(--vien);background:#fff;color:var(--chu);outline:none}
    .o:focus{border-color:#c8b19c;box-shadow:0 0 0 4px rgba(200,177,156,.14)}
    .nut-chinh{background:var(--nut);color:#fff;padding:15px 18px;border-radius:18px;font-weight:600}
    .nut-chinh:hover{background:var(--nut-hover)}
    .goi-y{margin-top:18px;padding:14px 16px;border-radius:18px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px;line-height:1.7}
.mat-khau-wrap{position:relative}.mat-khau-wrap .o{padding-right:88px}.nut-mat-khau{position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:8px 12px;border-radius:12px;background:#f5eee6;color:var(--dam);font-size:13px}.auth-note{color:var(--phu);font-size:13px;line-height:1.6}.auth-form h2{margin:0 0 6px;font-size:28px;letter-spacing:-.03em}.auth-form .sub-auth{margin:0 0 20px;color:var(--phu);font-size:14px}
    .bo-cuc{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;min-height:calc(100vh - 36px)}
    .side{background:rgba(255,250,245,.78);border:1px solid rgba(231,219,205,.9);border-radius:32px;box-shadow:var(--bong);padding:16px;display:flex;flex-direction:column;gap:14px}
    .brand{width:56px;height:56px;border-radius:20px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:var(--bong)}
    .nav-doc{display:grid;gap:10px;margin-top:6px}
    .nav-item{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:13px 14px;border-radius:16px;background:#fbf7f2;border:1px solid #f2e6d8;color:var(--chu)}
    .nav-item.on,.nav-item:hover{background:#fff}
    .nav-so{display:inline-flex;min-width:22px;height:22px;padding:0 7px;align-items:center;justify-content:center;border-radius:999px;background:var(--the-2);font-size:12px;color:var(--chu)}
    .avatar{width:44px;height:44px;border-radius:50%;background:#352a24;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700}
    .giua,.phai{background:rgba(255,250,245,.78);border:1px solid rgba(231,219,205,.9);border-radius:32px;box-shadow:var(--bong)}
    .giua{overflow:hidden}
    .header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--vien);min-height:88px}
    .header.gon{min-height:auto;padding:18px 22px 8px;border-bottom:none}
    .header-left{display:flex;align-items:center;gap:12px}
    .trang-thai{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#eef6f1;color:var(--xanh);font-weight:600}
    .cham{width:8px;height:8px;border-radius:50%;background:#5d8c7d}
    .actions{display:flex;gap:10px;align-items:center}
    .nut-phu{padding:12px 16px;border-radius:16px;background:var(--the-2);color:var(--chu)}
    .menu-wrap{position:relative}
    .menu{position:absolute;top:56px;right:0;background:#fff;border:1px solid var(--vien);border-radius:18px;box-shadow:var(--bong);padding:8px;min-width:190px;display:none;z-index:15}
    .menu.mo{display:block}
    .menu button{width:100%;text-align:left;padding:12px 14px;border-radius:12px;background:transparent;color:var(--chu)}
    .menu button:hover{background:var(--the-2)}
    .tao-box-gon{padding:18px 20px;gap:14px;margin-top:0}.tao-box-gon .tao-cta{min-height:56px}.tao-box-gon .tao-tabs{margin-top:12px}.noi-dung{padding-top:22px}.thanh-cong-cu{margin-top:18px}
.banner-luu-tru{margin:18px 22px 0;padding:14px 16px;border-radius:18px;background:#f1e7da;color:#6f5848;border:1px solid #e4d3bf}
    .noi-dung{padding:18px 22px 26px}
    .tao-box{display:flex;gap:14px;align-items:flex-start;padding:16px;border-radius:24px;background:var(--the-2);border:1px solid var(--vien)}
    .tao-main{flex:1}
    .tao-cta{width:100%;text-align:left;background:#fff;border:1px solid var(--vien);border-radius:18px;padding:16px 18px;color:var(--phu)}
    .tao-tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .tao-tabs button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--chu);border:1px solid var(--vien)}
    .thanh-cong-cu{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chips button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--phu);border:1px solid var(--vien)}
    .chips .on{background:#352a24;color:#fff;border-color:#352a24}
    .tim{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;background:#fff;border:1px solid var(--vien);min-width:280px}
    .tim input{border:none;outline:none;background:transparent;width:100%}
    .feed{margin-top:18px;display:grid;gap:14px}
    .the{background:#fff;border:1px solid var(--vien);border-radius:26px;padding:18px 18px 14px}
    .the-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .meta{display:flex;align-items:center;gap:12px}
    .ten{font-weight:650}
    .sub{font-size:13px;color:var(--phu);margin-top:3px}
    .nhan{display:inline-flex;padding:7px 10px;border-radius:999px;font-size:12px;background:#f3ebe2;color:#876b56}
    .noi-dung-bai{margin:14px 0 0;line-height:1.75;color:#3f3731;white-space:pre-wrap}
    .task-box{margin-top:14px;background:#fbf7f2;border:1px solid var(--vien);border-radius:20px;padding:14px}
    .task-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .task-item .k{font-size:12px;color:var(--phu);margin-bottom:6px}.task-item .v{font-weight:600}
    .anh-gia{margin-top:14px;height:220px;border-radius:22px;background:linear-gradient(135deg,#f0e7dc,#e8ddd0);display:grid;place-items:center;color:#8d7d6c}
    .tuong-tac{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid #f1e5d8}
    .tt-btn{padding:9px 12px;border-radius:999px;background:#f8f2ea;color:var(--chu)}
    .tt-btn.on{background:#ead8cb;color:#7d513e}
    .tt-btn.nho{padding:8px 10px;font-size:13px}
    .bl-wrap{margin-top:12px;display:grid;gap:10px}
    .bl{background:#fcf8f3;border:1px solid #f0e4d8;border-radius:18px;padding:12px 14px}
    .bl-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .bl-ten{font-size:14px;font-weight:600}.bl-time{font-size:12px;color:var(--phu)}
    .bl-nd{margin-top:6px;line-height:1.65;color:#433b35;white-space:pre-wrap}
    .da-sua{font-size:12px;color:var(--phu);margin-left:6px}
    .form-bl{display:flex;align-items:center;gap:10px;margin-top:10px}
    .form-bl input{flex:1;padding:12px 14px;border-radius:14px;border:1px solid var(--vien);background:#fff}
    .form-bl-actions{display:flex;align-items:center;gap:8px}
    .icon-tep{width:42px;height:42px;border-radius:12px;border:1px solid var(--vien);background:#fff;color:#24324a;display:flex;align-items:center;justify-content:center;font-size:19px;line-height:1;cursor:pointer}
    .icon-tep:hover{background:#f7f2eb}
    .icon-tep svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
    .nut-gui{height:42px;padding:0 16px;border-radius:12px}
    .phai{display:none}
    .card-side{background:#fff;border:1px solid var(--vien);border-radius:24px;padding:15px}
    .card-side h3{margin:0 0 12px;font-size:17px}
    .list{display:grid;gap:10px}
    .dong{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:16px;background:#fbf7f2;border:1px solid #f2e6d8}
    .mini{font-size:13px;color:var(--phu)}
.side-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-header{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-main{display:grid;gap:12px}.side-strip{display:flex;align-items:center;justify-content:space-between;gap:10px}.side-list{display:grid;gap:8px}.side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;background:#fbf7f2;border:1px solid #f2e6d8}.side-item .avatar{width:34px;height:34px;font-size:11px}.side-label{font-size:12px;color:var(--phu);margin-top:2px}.side-count{font-size:24px;font-weight:700;letter-spacing:-.03em}.side-menu{display:flex;align-items:center;gap:8px}.card-side h4{margin:0 0 10px;font-size:15px}.nho-gon .dong{padding:10px 12px}
    .link-nho{background:none;padding:0;color:#7a6250}
    .loi-moi{padding:12px;border-radius:16px;background:#fbf7f2;border:1px solid #f2e6d8}
    .toast-wrap{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:60}
    .toast{padding:12px 16px;border-radius:16px;background:#352a24;color:#fff;box-shadow:var(--bong)}
    .modal-nen{position:fixed;inset:0;background:rgba(45,36,30,.24);display:none;place-items:center;padding:18px;z-index:50}
    .modal-nen.mo{display:grid}
    .modal{width:min(100%,760px);max-height:90vh;overflow:auto;background:#fffaf5;border:1px solid var(--vien);border-radius:32px;padding:22px;box-shadow:var(--bong)}
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .modal h2{margin:0;font-size:22px}.modal p{margin:6px 0 0;color:var(--phu)}
    .seg{margin-top:18px;display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content}
    .seg button{padding:10px 16px;border-radius:999px;background:transparent;color:var(--phu)}
    .seg .on{background:#fff;color:var(--chu)}
    .form{display:grid;gap:14px;margin-top:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form label{display:grid;gap:8px;color:#6f6154}
    textarea.o{min-height:120px;resize:vertical}
    .foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .danger{background:#f4e5e3;color:var(--do)}
    .drawer{position:fixed;top:0;right:-440px;width:min(100%,440px);height:100vh;background:#fffaf5;border-left:1px solid var(--vien);box-shadow:var(--bong);z-index:55;padding:22px;transition:right .24s ease}
    .drawer.mo{right:0}
    .drawer-back{position:fixed;inset:0;background:rgba(45,36,30,.2);display:none;z-index:54}.drawer-back.mo{display:block}
    .muted{color:var(--phu)}

    .tep-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .nut-tep{width:44px;height:44px;border-radius:14px;background:#fff;border:1px solid var(--vien);color:#24324a;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nut-tep:hover{background:#f7f2eb}
    .preview-list{display:grid;gap:8px;margin-top:8px}
    .preview-file{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--vien);font-size:14px}
    .preview-file span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .anh-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px}
    .anh-item{overflow:hidden;border-radius:18px;border:1px solid var(--vien);background:#f3ece4}
    .anh-item img{display:block;width:100%;height:140px;object-fit:cover}
    .tep-list{display:grid;gap:8px;margin-top:12px}
    .tep-link{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:16px;background:#f8f2eb;border:1px solid var(--vien);color:var(--chu);text-decoration:none}
    @media (max-width: 1100px){.bo-cuc{grid-template-columns:1fr}.side{display:none}.tim{min-width:unset;width:100%}.task-grid,.grid-2,.auth-card{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="ung-dung" id="ung_dung"></div>
<div class="modal-nen" id="modal_tao">
  <div class="modal">
    <div class="modal-head">
      <div><h2>Tạo nội dung</h2></div>
      <button type="button" class="nut-phu" onclick="dong_modal_tao()">Đóng</button>
    </div>
    <div class="seg" id="seg_tao">
      <button class="on" onclick="chuyen_kieu_tao('bai_viet')">Bài viết</button>
      <button onclick="chuyen_kieu_tao('task')">Task</button>
    </div>
    <div class="form" id="form_tao"></div>
    <div class="foot">
      <button type="button" class="nut-phu" onclick="dong_modal_tao()">Hủy</button>
      <button type="button" class="nut-chinh" onclick="luu_noi_dung_moi()">Lưu</button>
    </div>
  </div>
</div>
<div class="drawer-back" id="drawer_back" onclick="dong_drawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="toast-wrap" id="toast_wrap"></div>
<script>
const KHOA = 'groupshare_clean_v1';
const PHIEN = 'groupshare_nguoi_dung';
let giao_dien = { che_do_auth:'dang_nhap', kieu_tao:'bai_viet', bo_loc:'tat_ca', tim:'', mo_menu:false, drawer:null, tao_anh:[], tao_tep:[], bl_tam:{} };

const ICON_ANH = `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect><circle cx="9" cy="10" r="1.7"></circle><path d="M20.5 15.5l-4.6-4.6a1.5 1.5 0 0 0-2.1 0L7 17.7"></path></svg>`;
const ICON_TEP = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.4 11.1l-8.5 8.5a5 5 0 0 1-7.1-7.1l9.2-9.2a3.5 3.5 0 1 1 4.9 4.9L10.1 18a2 2 0 1 1-2.8-2.8l8.1-8.1"></path></svg>`;
function icon_nut(loai){
  return loai === 'anh' ? ICON_ANH : ICON_TEP;
}
function nhan_dinh_kem(loai, ten){
  return `${loai === 'anh' ? 'Ảnh' : 'Tệp'} · ${escape_html(ten)}`;
}

function tao_du_lieu_mau(){
  return {
    nhom:{ id:1, trang_thai:'dang_hoat_dong', truong_nhom:'tu_quyen' },
    nguoi_dung:[
      {ten_dang_nhap:'tu_quyen', mat_khau:'123456', ho_ten:'Vương Thị Tú Quyên'},
      {ten_dang_nhap:'quang_duy', mat_khau:'123456', ho_ten:'Bùi Quang Duy'},
      {ten_dang_nhap:'kim_oanh', mat_khau:'123456', ho_ten:'Trịnh Kim Oanh'},
      {ten_dang_nhap:'thuy_trang', mat_khau:'123456', ho_ten:'Nguyễn Thùy Trang'},
      {ten_dang_nhap:'phuong_linh', mat_khau:'123456', ho_ten:'Trần Phương Linh'}
    ],
    thanh_vien:[
      {ten_dang_nhap:'tu_quyen', vai_tro:'truong_nhom', trang_thai:'dang_hoat_dong'},
      {ten_dang_nhap:'quang_duy', vai_tro:'thanh_vien', trang_thai:'dang_hoat_dong'},
      {ten_dang_nhap:'kim_oanh', vai_tro:'thanh_vien', trang_thai:'dang_hoat_dong'},
      {ten_dang_nhap:'thuy_trang', vai_tro:'thanh_vien', trang_thai:'dang_hoat_dong'},
      {ten_dang_nhap:'phuong_linh', vai_tro:'thanh_vien', trang_thai:'dang_hoat_dong'}
    ],
    loi_moi:[],
    bai_viet:[
      {id:1,kieu:'bai_viet',tieu_de:'Phác thảo giao diện mới',noi_dung:'Mình đã tinh giản header và gom bớt các thông tin thừa để feed là trung tâm.',tac_gia:'kim_oanh',quyen:'toan_nhom',thich:['tu_quyen','quang_duy'],da_sua:false,thoi_gian:thoi_gian() },
      {id:2,kieu:'task',tieu_de:'Hoàn thiện màn đăng nhập',noi_dung:'Giữ bố cục gọn, bỏ mô tả thừa, ưu tiên cảm giác sạch và ấm.',tac_gia:'tu_quyen',nguoi_nhan:'quang_duy',deadline:'2026-04-25',trang_thai:'dang_thuc_hien',quyen:'toan_nhom',thich:['kim_oanh'],da_sua:false,thoi_gian:thoi_gian()},
      {id:3,kieu:'bai_viet',tieu_de:'Góp ý riêng về task',noi_dung:'Mình nghĩ task chỉ nên giao cho một người phụ trách chính để dễ theo dõi.',tac_gia:'thuy_trang',quyen:'chi_truong_nhom',thich:[],da_sua:false,thoi_gian:thoi_gian()}
    ],
    binh_luan:[
      {id:1,bai_id:1,tac_gia:'tu_quyen',noi_dung:'Nhìn thoáng hơn hẳn rồi.',da_sua:false,thoi_gian:thoi_gian()},
      {id:2,bai_id:2,tac_gia:'quang_duy',noi_dung:'Mình đang chỉnh lại phần spacing.',da_sua:false,thoi_gian:thoi_gian()}
    ],
    thong_bao:[
      {id:1,nguoi_nhan:'tu_quyen',noi_dung:'Bạn có 1 cập nhật mới trong nhóm.',da_doc:false},
      {id:2,nguoi_nhan:'quang_duy',noi_dung:'Bạn được giao một task mới.',da_doc:false}
    ]
  }
}

let du_lieu = tai_du_lieu();
function tai_du_lieu(){ try{ return JSON.parse(localStorage.getItem(KHOA)) || tao_du_lieu_mau(); }catch{ return tao_du_lieu_mau(); } }
function luu_du_lieu(){ localStorage.setItem(KHOA, JSON.stringify(du_lieu)); }
function lay_ten(ten_dang_nhap){ return du_lieu.nguoi_dung.find(n=>n.ten_dang_nhap===ten_dang_nhap)?.ho_ten || ten_dang_nhap; }
function nguoi_hien_tai(){ const u = localStorage.getItem(PHIEN); return du_lieu.nguoi_dung.find(n=>n.ten_dang_nhap===u) || null; }
function la_truong_nhom(ten_dang_nhap){ return du_lieu.nhom.truong_nhom===ten_dang_nhap; }
function la_thanh_vien(ten_dang_nhap){ return du_lieu.thanh_vien.some(t=>t.ten_dang_nhap===ten_dang_nhap && t.trang_thai==='dang_hoat_dong'); }
function thoi_gian(){ return new Date().toLocaleString('vi-VN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}); }
function avatar_chu(ho_ten){ return ho_ten.split(' ').map(t=>t[0]).slice(-2).join('').toUpperCase(); }
function id_moi(ds){ return ds.length ? Math.max(...ds.map(x=>x.id))+1 : 1; }

function dinh_dang_kich_thuoc(bytes){
  if(!bytes) return '';
  const don_vi = ['B','KB','MB','GB'];
  let i = 0, n = bytes;
  while(n >= 1024 && i < don_vi.length-1){ n /= 1024; i++; }
  return `${n.toFixed(n >= 10 || i===0 ? 0 : 1)} ${don_vi[i]}`;
}
function bo_ky_tu_nguy_hiem(ten){ return String(ten||'').replace(/[<>:"\\|?*]+/g,'').trim() || 'tep'; }
function lay_du_lieu_binh_luan_tam(bai_id){
  if(!giao_dien.bl_tam[bai_id]) giao_dien.bl_tam[bai_id] = { anh:[], tep:[] };
  return giao_dien.bl_tam[bai_id];
}
async function doc_file(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve({ ten:file.name, loai:file.type, kich_thuoc:file.size, du_lieu:reader.result });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function them_file_tao(input, loai){
  const files = Array.from(input.files || []);
  if(!files.length) return;
  const ds = await Promise.all(files.map(doc_file));
  if(loai === 'anh') giao_dien.tao_anh.push(...ds.filter(f => (f.loai||'').startsWith('image/')));
  else giao_dien.tao_tep.push(...ds);
  input.value = '';
  render_form_tao();
}
async function them_file_binh_luan(bai_id, input, loai){
  const files = Array.from(input.files || []);
  if(!files.length) return;
  const ds = await Promise.all(files.map(doc_file));
  const tam = lay_du_lieu_binh_luan_tam(bai_id);
  if(loai === 'anh') tam.anh.push(...ds.filter(f => (f.loai||'').startsWith('image/')));
  else tam.tep.push(...ds);
  input.value = '';
  render();
}
function xoa_file_tao(loai, chi_so){
  if(loai === 'anh') giao_dien.tao_anh.splice(chi_so,1); else giao_dien.tao_tep.splice(chi_so,1);
  render_form_tao();
}
function xoa_file_binh_luan(bai_id, loai, chi_so){
  const tam = lay_du_lieu_binh_luan_tam(bai_id);
  if(loai === 'anh') tam.anh.splice(chi_so,1); else tam.tep.splice(chi_so,1);
  render();
}
function render_dinh_kem(anh = [], tep = []){
  const khu_anh = anh.length ? `<div class="anh-list">${anh.map(a=>`<div class="anh-item"><img src="${a.du_lieu}" alt="${escape_html(a.ten)}" /></div>`).join('')}</div>` : '';
  const khu_tep = tep.length ? `<div class="tep-list">${tep.map(t=>`<a class="tep-link" href="${t.du_lieu}" download="${escape_html(bo_ky_tu_nguy_hiem(t.ten))}"><span>${nhan_dinh_kem('tep', t.ten)}</span><small>${dinh_dang_kich_thuoc(t.kich_thuoc)}</small></a>`).join('')}</div>` : '';
  return khu_anh + khu_tep;
}
function render_preview_tao(){
  const anh = giao_dien.tao_anh.length ? `<div class="preview-list">${giao_dien.tao_anh.map((a,i)=>`<div class="preview-file"><span>${nhan_dinh_kem('anh', a.ten)}</span><button class="link-nho" onclick="xoa_file_tao('anh', ${i})">Xóa</button></div>`).join('')}</div>` : '';
  const tep = giao_dien.tao_tep.length ? `<div class="preview-list">${giao_dien.tao_tep.map((t,i)=>`<div class="preview-file"><span>${nhan_dinh_kem('tep', t.ten)}</span><button class="link-nho" onclick="xoa_file_tao('tep', ${i})">Xóa</button></div>`).join('')}</div>` : '';
  return anh + tep;
}
function render_preview_binh_luan(bai_id){
  const tam = lay_du_lieu_binh_luan_tam(bai_id);
  const anh = tam.anh.length ? `<div class="preview-list">${tam.anh.map((a,i)=>`<div class="preview-file"><span>${nhan_dinh_kem('anh', a.ten)}</span><button class="link-nho" onclick="xoa_file_binh_luan(${bai_id}, 'anh', ${i})">Xóa</button></div>`).join('')}</div>` : '';
  const tep = tam.tep.length ? `<div class="preview-list">${tam.tep.map((t,i)=>`<div class="preview-file"><span>${nhan_dinh_kem('tep', t.ten)}</span><button class="link-nho" onclick="xoa_file_binh_luan(${bai_id}, 'tep', ${i})">Xóa</button></div>`).join('')}</div>` : '';
  return anh + tep;
}


function dang_nhap(){
  const ten = document.getElementById('dn_ten').value.trim();
  const mk = document.getElementById('dn_mk').value;
  const u = du_lieu.nguoi_dung.find(x=>x.ten_dang_nhap===ten && x.mat_khau===mk);
  if(!u){ toast('Sai tên đăng nhập hoặc mật khẩu'); return; }
  localStorage.setItem(PHIEN, u.ten_dang_nhap);
  render();
}
function dang_ky(){
  const ten = document.getElementById('dk_ten').value.trim();
  const ho_ten = document.getElementById('dk_ho_ten').value.trim();
  const mk = document.getElementById('dk_mk').value;
  if(!ten || !ho_ten || !mk){ toast('Nhập đầy đủ thông tin'); return; }
  if(du_lieu.nguoi_dung.some(x=>x.ten_dang_nhap===ten)){ toast('Tên đăng nhập đã tồn tại'); return; }
  du_lieu.nguoi_dung.push({ten_dang_nhap:ten, ho_ten, mat_khau:mk});
  luu_du_lieu();
  toast('Đăng ký thành công');
  giao_dien.che_do_auth='dang_nhap';
  render();
}
function dang_xuat(){ localStorage.removeItem(PHIEN); giao_dien.mo_menu=false; render(); }
function doi_hien_mat_khau(id, nut){ const o = document.getElementById(id); if(!o) return; const dangAn = o.type === 'password'; o.type = dangAn ? 'text' : 'password'; nut.textContent = dangAn ? 'Ẩn' : 'Hiện'; }

function render(){
  const u = nguoi_hien_tai();
  document.getElementById('ung_dung').innerHTML = u ? man_hinh_chinh(u) : man_hinh_auth();
  document.getElementById('modal_tao').classList.remove('mo');
  document.getElementById('drawer').classList.remove('mo');
  document.getElementById('drawer_back').classList.remove('mo');
}

  if(!ds.length) return '';
  return `<div class="card-side" style="margin-top:16px"><h3>Lời mời chờ phản hồi</h3><div class="list">${ds.map(l=>`<div class="loi-moi"><div>${lay_ten(l.nguoi_gui)} mời bạn vào nhóm</div><div class="mini" style="margin-top:4px">${l.thoi_gian}</div><div style="margin-top:10px;display:flex;gap:8px"><button class="nut-chinh" onclick="phan_hoi_loi_moi(${l.id}, 'chap_nhan')">Chấp nhận</button><button class="nut-phu" onclick="phan_hoi_loi_moi(${l.id}, 'tu_choi')">Từ chối</button></div></div>`).join('')}</div></div>`
}

  const la_tac_gia = bl.tac_gia===u.ten_dang_nhap;

    <div class="bl-top">
      <div><span class="bl-ten">${lay_ten(bl.tac_gia)}</span><span class="bl-time"> · ${bl.thoi_gian}</span></div>
      ${la_tac_gia?`<div style="display:flex;gap:6px"><button class="link-nho" onclick="bat_dau_sua_binh_luan(${bl.id})">Sửa</button><button class="link-nho" onclick="xoa_binh_luan(${bl.id})">Xóa</button></div>`:''}
    </div>
    ${bl.dang_sua ? `
      <div style="display:grid;gap:8px;margin-top:8px">
        <textarea class="o" id="sua_bl_${bl.id}" style="min-height:90px">${escape_html(bl.noi_dung)}</textarea>
        <div style="display:flex;gap:8px"><button class="nut-chinh" onclick="luu_sua_binh_luan(${bl.id})">Lưu</button><button class="nut-phu" onclick="huy_sua_binh_luan(${bl.id})">Hủy</button></div>
      </div>` : `<div class="bl-nd">${escape_html(bl.noi_dung)}${bl.da_sua?'<span class="da-sua">(đã chỉnh sửa)</span>':''}</div>${render_dinh_kem(bl.anh_dinh_kem || [], bl.tep_dinh_kem || [])}`}
  </div>`;
}

function lay_feed_hien_thi(u){
  let ds = du_lieu.bai_viet.filter(b=>{
    if(la_truong_nhom(u.ten_dang_nhap)) return true;
    if(b.quyen==='toan_nhom') return la_thanh_vien(u.ten_dang_nhap);
    if(b.quyen==='chi_truong_nhom') return b.tac_gia===u.ten_dang_nhap;
    return true;
  });
  if(giao_dien.bo_loc==='bai_viet') ds = ds.filter(b=>b.kieu==='bai_viet');
  if(giao_dien.bo_loc==='task') ds = ds.filter(b=>b.kieu==='task');
  if(giao_dien.bo_loc==='cua_toi') ds = ds.filter(b=>b.tac_gia===u.ten_dang_nhap || b.nguoi_nhan===u.ten_dang_nhap);
  if(giao_dien.tim.trim()){
    const q = giao_dien.tim.toLowerCase();
    ds = ds.filter(b => [b.tieu_de,b.noi_dung,lay_ten(b.tac_gia)].join(' ').toLowerCase().includes(q));
  }
  return ds.sort((a,b)=>b.id-a.id);
}
function doi_bo_loc(v){ giao_dien.bo_loc=v; render(); }
function bat_menu(){ giao_dien.mo_menu=!giao_dien.mo_menu; render(); }

function mo_modal_tao(kieu='bai_viet'){ giao_dien.kieu_tao = kieu; giao_dien.tao_anh=[]; giao_dien.tao_tep=[]; document.getElementById('modal_tao').classList.add('mo'); render_form_tao(); }
function dong_modal_tao(){ giao_dien.tao_anh=[]; giao_dien.tao_tep=[]; document.getElementById('modal_tao').classList.remove('mo'); }
function chuyen_kieu_tao(kieu){ giao_dien.kieu_tao=kieu; render_form_tao(); }
function render_form_tao(){
  const seg = document.getElementById('seg_tao'); if(!seg) return;
  seg.querySelectorAll('button')[0].classList.toggle('on',giao_dien.kieu_tao==='bai_viet');
  seg.querySelectorAll('button')[1].classList.toggle('on',giao_dien.kieu_tao==='task');
  const form = document.getElementById('form_tao');
  if(giao_dien.kieu_tao==='bai_viet'){
    form.innerHTML = `
      <label>Tiêu đề (không bắt buộc)<input class="o" id="tao_tieu_de" /></label>
      <label>Nội dung<textarea class="o" id="tao_noi_dung"></textarea></label>
      <label>Quyền xem<select class="o" id="tao_quyen"><option value="toan_nhom">Toàn nhóm</option><option value="chi_truong_nhom">Chỉ trưởng nhóm</option></select></label>
      <div><div class="tep-actions"><button type="button" class="nut-tep" onclick="document.getElementById('tao_anh').click()" title="Thêm ảnh">${ICON_ANH}</button><button type="button" class="nut-tep" onclick="document.getElementById(\'tao_tep\').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="tao_anh" type="file" accept="image/*" multiple onchange="them_file_tao(this, 'anh')" /><input class="an" id="tao_tep" type="file" multiple onchange="them_file_tao(this, 'tep')" /></div>${render_preview_tao()}</div>`;
  } else {
    const thanh_vien = du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong' && t.ten_dang_nhap!==du_lieu.nhom.truong_nhom);
    form.innerHTML = `
      <label>Tiêu đề task<input class="o" id="tao_tieu_de" /></label>
      <label>Mô tả<textarea class="o" id="tao_noi_dung"></textarea></label>
      <div class="grid-2">
        <label>Người nhận<select class="o" id="tao_nguoi_nhan">${thanh_vien.map(t=>`<option value="${t.ten_dang_nhap}">${lay_ten(t.ten_dang_nhap)}</option>`).join('')}</select></label>
        <label>Deadline<input class="o" id="tao_deadline" type="date" /></label>
      </div>
      <div><div class="tep-actions"><button type="button" class="nut-tep" onclick="document.getElementById('tao_anh').click()" title="Thêm ảnh">${ICON_ANH}</button><button type="button" class="nut-tep" onclick="document.getElementById(\'tao_tep\').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="tao_anh" type="file" accept="image/*" multiple onchange="them_file_tao(this, 'anh')" /><input class="an" id="tao_tep" type="file" multiple onchange="them_file_tao(this, 'tep')" /></div>${render_preview_tao()}</div>`;
  }
}
function luu_noi_dung_moi(){
  const u = nguoi_hien_tai();
  if(du_lieu.nhom.trang_thai!=='dang_hoat_dong') return toast('Nhóm đang ở chế độ chỉ đọc');
  const tieu_de = document.getElementById('tao_tieu_de').value.trim();
  const noi_dung = document.getElementById('tao_noi_dung').value.trim();
  const co_dinh_kem = giao_dien.tao_anh.length || giao_dien.tao_tep.length;
  if(giao_dien.kieu_tao==='bai_viet'){
    if(!noi_dung && !co_dinh_kem) return toast('Viết nội dung hoặc đính kèm trước khi đăng');
  } else {
    if(!tieu_de) return toast('Nhập tiêu đề task');
    if(!noi_dung && !co_dinh_kem) return toast('Nhập mô tả hoặc đính kèm trước khi tạo task');
  }
  const moi = { id:id_moi(du_lieu.bai_viet), kieu:giao_dien.kieu_tao, tieu_de, noi_dung, tac_gia:u.ten_dang_nhap, quyen:'toan_nhom', thich:[], da_sua:false, thoi_gian:thoi_gian(), anh_dinh_kem:[...giao_dien.tao_anh], tep_dinh_kem:[...giao_dien.tao_tep] };
  if(giao_dien.kieu_tao==='bai_viet'){
    moi.quyen = document.getElementById('tao_quyen').value;
  } else {
    moi.nguoi_nhan = document.getElementById('tao_nguoi_nhan').value;
    moi.deadline = document.getElementById('tao_deadline').value;
    moi.trang_thai = 'chua_lam';
    du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:moi.nguoi_nhan, noi_dung:'Bạn có một task mới.', da_doc:false});
  }
  du_lieu.bai_viet.push(moi); luu_du_lieu(); dong_modal_tao(); render(); toast('Đã tạo nội dung');
}

function thich_bai(id){ const u=nguoi_hien_tai(); const b=du_lieu.bai_viet.find(x=>x.id===id); const i=b.thich.indexOf(u.ten_dang_nhap); if(i>=0) b.thich.splice(i,1); else b.thich.push(u.ten_dang_nhap); luu_du_lieu(); render(); }
function them_binh_luan(bai_id){
  const u=nguoi_hien_tai(); if(du_lieu.nhom.trang_thai!=='dang_hoat_dong') return toast('Nhóm đang ở chế độ chỉ đọc');
  const input=document.getElementById('bl_'+bai_id); const noi_dung=input.value.trim(); const tam = lay_du_lieu_binh_luan_tam(bai_id);
  if(!noi_dung && !tam.anh.length && !tam.tep.length) return;
  du_lieu.binh_luan.push({id:id_moi(du_lieu.binh_luan), bai_id, tac_gia:u.ten_dang_nhap, noi_dung, da_sua:false, thoi_gian:thoi_gian(), anh_dinh_kem:[...tam.anh], tep_dinh_kem:[...tam.tep]});
  giao_dien.bl_tam[bai_id] = { anh:[], tep:[] };
  const bai = du_lieu.bai_viet.find(b=>b.id===bai_id); if(bai && bai.tac_gia!==u.ten_dang_nhap){ du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:bai.tac_gia, noi_dung:'Có bình luận mới vào bài của bạn.', da_doc:false}); }
  luu_du_lieu(); render();
}
function bat_dau_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; b.dang_sua=true; render(); }
function huy_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); b.dang_sua=false; render(); }
function luu_sua_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; b.tieu_de=document.getElementById('sua_tieu_de_'+id).value.trim(); b.noi_dung=document.getElementById('sua_noi_dung_'+id).value.trim(); b.dang_sua=false; b.da_sua=true; luu_du_lieu(); render(); toast('Đã cập nhật bài viết'); }
function xoa_bai(id){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; if(!confirm('Xóa bài viết này?')) return; du_lieu.bai_viet = du_lieu.bai_viet.filter(x=>x.id!==id); du_lieu.binh_luan = du_lieu.binh_luan.filter(x=>x.bai_id!==id); luu_du_lieu(); render(); toast('Đã xóa bài viết'); }
function bat_dau_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; bl.dang_sua=true; render(); }
function huy_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); bl.dang_sua=false; render(); }
function luu_sua_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; bl.noi_dung=document.getElementById('sua_bl_'+id).value.trim(); bl.dang_sua=false; bl.da_sua=true; luu_du_lieu(); render(); toast('Đã cập nhật bình luận'); }
function xoa_binh_luan(id){ const bl=du_lieu.binh_luan.find(x=>x.id===id); if(bl.tac_gia!==nguoi_hien_tai().ten_dang_nhap) return; if(!confirm('Xóa bình luận này?')) return; du_lieu.binh_luan = du_lieu.binh_luan.filter(x=>x.id!==id); luu_du_lieu(); render(); toast('Đã xóa bình luận'); }
function cap_nhat_task(id, trang_thai){ const b=du_lieu.bai_viet.find(x=>x.id===id); if(b.nguoi_nhan!==nguoi_hien_tai().ten_dang_nhap) return; b.trang_thai=trang_thai; luu_du_lieu(); render(); toast('Đã cập nhật task'); }
function nhan_task(v){ return {chua_lam:'Chưa làm',dang_thuc_hien:'Đang thực hiện',hoan_thanh:'Hoàn thành'}[v] || v; }
function chuyen_trang_thai_luu_tru(){ du_lieu.nhom.trang_thai = du_lieu.nhom.trang_thai==='dang_hoat_dong' ? 'luu_tru' : 'dang_hoat_dong'; luu_du_lieu(); giao_dien.mo_menu=false; render(); toast(du_lieu.nhom.trang_thai==='luu_tru'?'Đã lưu trữ nhóm':'Đã mở lại nhóm'); }
function doc_het_thong_bao(){ const u=nguoi_hien_tai(); du_lieu.thong_bao.forEach(t=>{ if(t.nguoi_nhan===u.ten_dang_nhap) t.da_doc=true; }); luu_du_lieu(); render(); }

function mo_drawer(kieu, id){ giao_dien.drawer={kieu,id}; document.getElementById('drawer_back').classList.add('mo'); document.getElementById('drawer').classList.add('mo'); const drawer=document.getElementById('drawer'); drawer.innerHTML = render_drawer(kieu,id); }
function dong_drawer(){ document.getElementById('drawer_back').classList.remove('mo'); document.getElementById('drawer').classList.remove('mo'); }
function render_drawer(kieu,id){
  if(kieu==='thanh_vien'){
    return `<div class="modal-head"><div><h2>Thành viên</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').map(tv=>`<div class="dong"><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="width:38px;height:38px;font-size:11px">${avatar_chu(lay_ten(tv.ten_dang_nhap))}</div><div><div>${lay_ten(tv.ten_dang_nhap)}</div><div class="mini">${tv.vai_tro==='truong_nhom'?'Trưởng nhóm':'Thành viên'}</div></div></div></div>`).join('')}</div>`;
  }
  if(kieu==='thong_bao'){
    const u=nguoi_hien_tai(); const ds=du_lieu.thong_bao.filter(t=>t.nguoi_nhan===u.ten_dang_nhap);
    return `<div class="modal-head"><div><h2>Thông báo</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(tb=>`<div class="loi-moi"><div class="mini">${tb.da_doc?'Đã đọc':'Mới'}</div><div style="margin-top:6px">${tb.noi_dung}</div></div>`).join('') || '<div class="mini">Chưa có thông báo.</div>'}</div>`;
  }
  if(kieu==='binh_luan'){
    const bai = du_lieu.bai_viet.find(b=>b.id===id); const ds = du_lieu.binh_luan.filter(x=>x.bai_id===id); const u=nguoi_hien_tai();
    return `<div class="modal-head"><div><h2>${escape_html(bai.tieu_de||'Bình luận')}</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(bl=>render_bl(bl,u)).join('') || '<div class="mini">Chưa có bình luận.</div>'}</div>`;
  }
  if(kieu==='moi_thanh_vien'){
    const ds = du_lieu.nguoi_dung.filter(n=>!la_thanh_vien(n.ten_dang_nhap));
    return `<div class="modal-head"><div><h2>Gửi lời mời</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(n=>`<div class="dong"><div><div>${n.ho_ten}</div><div class="mini">@${n.ten_dang_nhap}</div></div><button class="nut-phu" onclick="gui_loi_moi('${n.ten_dang_nhap}')">Mời</button></div>`).join('') || '<div class="mini">Không còn người dùng nào để mời.</div>'}</div>`;
  }
  if(kieu==='loi_moi_gui'){
    const ds = du_lieu.loi_moi.slice().reverse();
    return `<div class="modal-head"><div><h2>Lời mời đã gửi</h2></div><button class="nut-phu" onclick="dong_drawer()">Đóng</button></div>
      <div class="list" style="margin-top:18px">${ds.map(l=>`<div class="loi-moi"><div>${lay_ten(l.nguoi_nhan)}</div><div class="mini" style="margin-top:4px">${trang_thai_loi_moi(l.trang_thai)} · ${l.thoi_gian}</div></div>`).join('') || '<div class="mini">Chưa có lời mời nào.</div>'}</div>`;
  }
  return '';
}
function trang_thai_loi_moi(v){ return {cho_phan_hoi:'Chờ phản hồi',chap_nhan:'Đã chấp nhận',tu_choi:'Đã từ chối'}[v] || v; }
function gui_loi_moi(ten_dang_nhap){
  const u=nguoi_hien_tai();
  if(du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi')) return toast('Đã có lời mời chờ phản hồi');
  du_lieu.loi_moi.push({id:id_moi(du_lieu.loi_moi), nguoi_gui:u.ten_dang_nhap, nguoi_nhan:ten_dang_nhap, trang_thai:'cho_phan_hoi', thoi_gian:thoi_gian()});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:ten_dang_nhap, noi_dung:'Bạn có một lời mời vào nhóm.', da_doc:false});
  luu_du_lieu(); mo_drawer('moi_thanh_vien'); toast('Đã gửi lời mời');
}
function co_loi_moi_cho(ten_dang_nhap){ return du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi'); }
function phan_hoi_loi_moi(id, hanh_dong){
  const l=du_lieu.loi_moi.find(x=>x.id===id); if(!l) return;
  l.trang_thai = hanh_dong;
  if(hanh_dong==='chap_nhan' && !la_thanh_vien(l.nguoi_nhan)) du_lieu.thanh_vien.push({ten_dang_nhap:l.nguoi_nhan,vai_tro:'thanh_vien',trang_thai:'dang_hoat_dong'});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:l.nguoi_gui, noi_dung:`${lay_ten(l.nguoi_nhan)} ${hanh_dong==='chap_nhan'?'đã chấp nhận':'đã từ chối'} lời mời.`, da_doc:false});
  luu_du_lieu(); render(); toast(hanh_dong==='chap_nhan'?'Đã tham gia nhóm':'Đã từ chối lời mời');
}

function toast(noi_dung){ const wrap=document.getElementById('toast_wrap'); if(!wrap) return; const div=document.createElement('div'); div.className='toast'; div.textContent=noi_dung; wrap.appendChild(div); setTimeout(()=>div.remove(),2200); }
function escape_html(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

render();
</script>
</body>
</html>
