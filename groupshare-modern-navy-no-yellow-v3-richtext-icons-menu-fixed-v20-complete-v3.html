<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupShare</title>
  <style>
    :root{
      --nen:#F4F5F7;
      --the:#FFFFFF;
      --the-2:#F7F8FA;
      --vien:#E5E7EB;
      --chu:#111827;
      --phu:#6B7280;
      --dam:#1F2937;
      --nhan:#E8EEF8;
      --xanh:#1E3A5F;
      --nut:#1E3A5F;
      --nut-hover:#243e66;
      --do:#1E3A5F;
      --vang:#F1F3F5;
      --bong:0 10px 30px rgba(17,24,39,.05);
      --bo:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--nen);color:var(--chu)}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer;border:none;transition:background .18s ease,color .18s ease,border-color .18s ease,box-shadow .18s ease}
    a{transition:background .18s ease,color .18s ease,border-color .18s ease}
    .ten,.bl-ten,.task-item .v{letter-spacing:-.01em}
    .an{display:none!important}
    .ung-dung{min-height:100vh}
    .khung{max-width:1440px;margin:0 auto;padding:18px}
    .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .auth-card{width:min(100%,920px);display:grid;grid-template-columns:1.1fr .9fr;background:#FFFFFF;border:1px solid var(--vien);box-shadow:var(--bong);border-radius:22px;overflow:hidden}
    .auth-visual{background:linear-gradient(180deg,#F8F9FB,#F1F3F6);padding:36px;display:flex;flex-direction:column;justify-content:space-between}
    .auth-visual .logo{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:0 8px 22px rgba(17,24,39,.05)}
    .auth-visual h1{font-size:36px;line-height:1.08;margin:24px 0 12px;font-weight:700;letter-spacing:-.04em;color:var(--chu)}
    .auth-visual p{margin:0;color:var(--phu);font-size:15px;line-height:1.7;max-width:420px}
    .auth-mini{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px}
    .auth-form{padding:34px;background:#FFFFFF}
    .phan-doi{display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content;margin-bottom:28px}
    .phan-doi button{padding:10px 18px;border-radius:999px;background:transparent;color:var(--phu)}
    .phan-doi .on{background:#fff;color:var(--chu);box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .nhom-o{display:grid;gap:14px}
    .truong{font-size:13px;color:var(--phu);margin-bottom:8px;font-weight:500}
    .o{width:100%;padding:16px 18px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:var(--chu);outline:none}
    .o:focus{border-color:#9DB4CF;box-shadow:0 0 0 4px rgba(30,58,95,.10)}
    .nut-chinh{background:var(--nut);color:#fff;padding:15px 18px;border-radius:10px;font-weight:600}
    .nut-chinh:hover{background:var(--nut-hover)}
    .goi-y{margin-top:18px;padding:14px 16px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:var(--phu);font-size:14px;line-height:1.7}
.mat-khau-wrap{position:relative}.mat-khau-wrap .o{padding-right:88px}.nut-mat-khau{position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:8px 12px;border-radius:12px;background:#F3F4F6;color:var(--dam);font-size:13px}.auth-note{color:var(--phu);font-size:13px;line-height:1.6}.auth-form h2{margin:0 0 6px;font-size:28px;letter-spacing:-.03em}.auth-form .sub-auth{margin:0 0 20px;color:var(--phu);font-size:14px}
    .bo-cuc{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;min-height:calc(100vh - 36px)}
    .side{background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;box-shadow:var(--bong);padding:16px;display:flex;flex-direction:column;gap:12px}
    .brand{width:56px;height:56px;border-radius:14px;background:#fff;display:grid;place-items:center;font-weight:700;letter-spacing:.08em;box-shadow:0 8px 22px rgba(17,24,39,.05)}
    .nav-doc{display:grid;gap:10px;margin-top:6px}
    .nav-item{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:13px 14px;border-radius:14px;background:#fff;border:1px solid transparent;color:var(--chu);transition:background .18s ease,border-color .18s ease}
    .nav-item.on,.nav-item:hover{background:var(--the-2);border-color:var(--vien)}
    .nav-so{display:inline-flex;min-width:22px;height:22px;padding:0 7px;align-items:center;justify-content:center;border-radius:999px;background:var(--the-2);font-size:12px;color:var(--chu)}
    .avatar{width:44px;height:44px;border-radius:50%;background:#1E3A5F;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
    .giua,.phai{background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;box-shadow:var(--bong)}
    .giua{overflow:hidden}
    .header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--vien);min-height:88px}
    .header.gon{min-height:auto;padding:18px 22px 8px;border-bottom:none}
    .header-left{display:flex;align-items:center;gap:12px}
    .trang-thai{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:var(--the-2);color:var(--xanh);font-weight:600}
    .cham{width:8px;height:8px;border-radius:50%;background:#1E3A5F}
    .actions{display:flex;gap:10px;align-items:center}
    .nut-phu{padding:12px 16px;border-radius:14px;background:var(--the-2);color:var(--chu);border:1px solid transparent}
    .menu-wrap{position:relative}
    .menu{position:absolute;top:56px;right:0;background:#fff;border:1px solid var(--vien);border-radius:10px;box-shadow:var(--bong);padding:8px;min-width:190px;display:none;z-index:15}
    .menu.mo{display:block}
    .menu button{width:100%;text-align:left;padding:12px 14px;border-radius:12px;background:transparent;color:var(--chu)}
    .menu button:hover{background:var(--the-2)}
    .tao-box-gon{padding:18px 20px;gap:16px;margin-top:0;border-radius:22px}.tao-box-gon .tao-cta{min-height:64px;border-radius:16px;font-size:17px;padding:0 20px}.tao-box-gon .tao-tabs{margin-top:12px}.noi-dung{padding-top:20px}.thanh-cong-cu{margin-top:16px}
    .khu-loc{display:grid;gap:14px;padding:16px;border:1px solid var(--vien);border-radius:20px;background:#fff;overflow:visible;width:100%}
    .khu-loc-trai{display:grid;gap:10px}
    .khu-loc-title{font-size:14px;font-weight:600;color:#475569}
    .khu-loc-phai{display:flex;align-items:center;justify-content:flex-start;width:100%}
.banner-luu-tru{margin:18px 22px 0;padding:14px 16px;border-radius:14px;background:var(--the-2);color:#475569;border:1px solid var(--vien)}
    .noi-dung{padding:18px 22px 26px}
    .tao-box{display:flex;gap:14px;align-items:flex-start;padding:18px;border-radius:18px;background:linear-gradient(180deg,#FFFFFF,#FAFBFC);border:1px solid var(--vien)}
    .tao-main{flex:1}
    .tao-cta{width:100%;text-align:left;background:#fff;border:1px solid var(--vien);border-radius:14px;padding:16px 18px;color:var(--phu)}
    .tao-tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .tao-tabs button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--chu);border:1px solid var(--vien)}
    .thanh-cong-cu{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chips button{padding:10px 14px;border-radius:999px;background:#fff;color:var(--phu);border:1px solid var(--vien)}
    .chips .on{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
    .nguoi-nhan-box{display:grid;gap:12px;padding:14px;border:1px solid var(--vien);border-radius:16px;background:var(--the)}
    .nguoi-nhan-search{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:#fff;border:1px solid #D1D5DB}
    .nguoi-nhan-search input{border:none;outline:none;background:transparent;width:100%}
    .nguoi-nhan-list{display:grid;gap:8px;max-height:240px;overflow:auto;padding-right:4px}
    .nguoi-nhan-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:12px;background:#fff;border:1px solid var(--vien)}
    .nguoi-nhan-item-left{display:flex;align-items:center;gap:10px;min-width:0}
    .nguoi-nhan-item .avatar{width:34px;height:34px;font-size:11px;flex-shrink:0}
    .nguoi-nhan-meta{min-width:0}
    .nguoi-nhan-meta strong,.nguoi-nhan-meta span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nguoi-nhan-meta span{font-size:12px;color:var(--phu);margin-top:2px}
    .nguoi-nhan-check{width:18px;height:18px}
    .nguoi-nhan-empty{padding:14px;border-radius:12px;background:var(--the-2);border:1px solid var(--vien);color:var(--phu);text-align:center}
    .tim-wrap{display:grid;gap:12px;min-width:320px;flex:1;max-width:none}
    .tim{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-radius:14px;background:#fff;border:1px solid #D1D5DB;min-width:280px}
    .tim:focus-within,.loc-trigger:focus,.loc-date-input:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .tim input{border:none;outline:none;background:transparent;width:100%}
    .loc-bar{display:grid;grid-template-columns:auto repeat(3,minmax(0,1fr));align-items:center;gap:14px 16px;color:var(--phu);width:100%}
    .loc-label{font-size:14px;font-weight:600;min-width:max-content;margin-right:2px}
    .loc-item{position:relative;display:flex;min-width:0;width:100%}
    .loc-trigger{height:54px;display:flex;align-items:center;gap:8px;padding:0 18px;border-radius:16px;border:1px solid var(--vien);background:#F3F5F8;color:#334155;outline:none;font-weight:500;width:100%}
    .loc-trigger{min-width:0;justify-content:space-between}
    .loc-trigger .icon-inline svg{width:16px;height:16px}
    .loc-trigger .chev{margin-left:4px}
    .loc-popup{position:absolute;top:calc(100% + 10px);left:0;z-index:35;width:320px;max-width:min(320px,calc(100vw - 56px));background:#fff;border:1px solid var(--vien);border-radius:16px;box-shadow:0 18px 45px rgba(17,24,39,.14);padding:14px}
    .loc-popup-title{font-size:13px;color:var(--phu);margin-bottom:10px;font-weight:600}
    .loc-popup-list{display:grid;gap:6px}
    .loc-nhanh{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .loc-nhanh-label{font-size:14px;font-weight:600;color:#475569}
    .loc-nhanh button{height:40px;padding:0 14px;border-radius:999px;background:#F3F5F8;color:#334155;border:1px solid var(--vien)}
    .loc-nhanh button.on{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
    .loc-popup-btn{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;padding:11px 12px;border-radius:12px;background:#fff;color:var(--chu);border:1px solid transparent}
    .loc-popup-btn:hover,.loc-popup-btn.on{background:var(--the-2);border-color:var(--vien)}
    .loc-popup-divider{height:1px;background:var(--vien);margin:12px 0}
    .loc-date-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .loc-date-field{display:grid;gap:8px}
    .loc-date-input{height:48px;padding:0 12px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:var(--dam);outline:none;width:100%;min-width:0;cursor:pointer}
    .loc-date-box{position:relative}
    .loc-clear{height:44px;padding:0 14px;border-radius:12px;background:#fff;border:1px solid var(--vien);color:var(--chu)}
    .tao-loc-wrap{display:grid;gap:10px}
    .tao-loc-trigger{width:100%;justify-content:space-between;background:#fff}
    .tao-loc-trigger-text{display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden}.tao-loc-trigger-text span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tao-loc-search{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--vien);border-radius:12px;background:#fff;margin-bottom:12px}
    .tao-loc-search input{border:none;outline:none;background:transparent;width:100%}
    .feed{margin-top:18px;display:grid;gap:14px}
    .the{background:#fff;border:1px solid var(--vien);border-radius:18px;padding:20px 20px 16px}
    .the-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .meta{display:flex;align-items:center;gap:12px}
    .ten{font-weight:650}
    .sub{font-size:13px;color:var(--phu);margin-top:3px}
    .nhan{display:inline-flex;padding:7px 10px;border-radius:999px;font-size:12px;background:var(--the-2);color:#1E3A5F}
    .noi-dung-bai{margin:14px 0 0;line-height:1.75;color:var(--chu)}
    .noi-dung-bai p,.bl-nd p{margin:.45em 0}
    .noi-dung-bai ul,.noi-dung-bai ol,.bl-nd ul,.bl-nd ol{padding-left:22px;margin:.45em 0}
    .noi-dung-bai img,.bl-nd img{display:block;max-width:100%;height:auto;border-radius:12px;margin:12px 0;border:1px solid var(--vien)}
    .task-box{margin-top:14px;background:var(--the-2);border:1px solid var(--vien);border-radius:16px;padding:14px}
    .task-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .task-item .k{font-size:12px;color:var(--phu);margin-bottom:6px}.task-item .v{font-weight:600}
    .anh-gia{margin-top:14px;height:220px;border-radius:22px;background:linear-gradient(135deg,#EEF2F7,#E5EBF4);display:grid;place-items:center;color:#5B677A}
    .tuong-tac{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--vien)}
    .tt-btn{padding:9px 12px;border-radius:999px;background:var(--the-2);color:var(--chu);border:1px solid transparent}
    .tt-btn.on{background:#EEF2F7;color:#1E3A5F;border-color:#D9E1EE}
    .tt-btn .tim-icon svg{fill:none;transition:fill .18s ease,stroke .18s ease}
    .tt-btn.on .tim-icon svg{fill:currentColor;stroke:currentColor}
    .tt-btn.nho{padding:8px 10px;font-size:13px}
    .tt-btn,.tim{display:flex;align-items:center}
    .tt-btn{gap:8px}
    .icon-inline{display:inline-flex;align-items:center;justify-content:center;color:currentColor}
    .icon-inline svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .bl-wrap{margin-top:12px;display:grid;gap:10px}
    .bl{background:#fff;border:1px solid var(--vien);border-radius:14px;padding:12px 14px}
    .bl-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .bl-ten{font-size:14px;font-weight:600}.bl-time{font-size:12px;color:var(--phu)}
    .bl-nd{margin-top:6px;line-height:1.65;color:var(--chu)}
    .da-sua{font-size:12px;color:var(--phu);margin-left:6px}
    .form-bl{display:grid;gap:10px;margin-top:10px}
    .form-bl-actions{display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
    .icon-tep{width:38px;height:38px;border-radius:10px;border:1px solid var(--vien);background:#fff;color:#24324a;display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer}
    .icon-tep:hover{background:#F3F4F6}
    .icon-tep svg{width:18px;height:18px;display:block;stroke:currentColor!important;fill:none!important;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .icon-tep svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .nut-gui{height:42px;padding:0 16px;border-radius:12px}
    .phai{display:none}
    .card-side{background:#fff;border:1px solid var(--vien);border-radius:18px;padding:16px}
    .card-side h3{margin:0 0 12px;font-size:17px}
    .list{display:grid;gap:10px}
    .dong{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}
    .mini{font-size:13px;color:var(--phu)}
.side-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-header{display:flex;align-items:center;justify-content:space-between;gap:12px}.side-main{display:grid;gap:12px}.side-strip{display:flex;align-items:center;justify-content:space-between;gap:10px}.side-list{display:grid;gap:8px}.side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}.side-item .avatar{width:34px;height:34px;font-size:11px}.side-label{font-size:12px;color:var(--phu);margin-top:2px}.side-count{font-size:24px;font-weight:700;letter-spacing:-.03em}.side-menu{display:flex;align-items:center;gap:8px}.card-side h4{margin:0 0 10px;font-size:15px}.nho-gon .dong{padding:10px 12px}
    .link-nho{background:none;padding:0;color:var(--phu)}
    .hanh-dong-wrap{position:relative;display:flex;align-items:center}
    .nut-more{width:36px;height:36px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--phu);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nut-more:hover{background:var(--the-2);color:var(--chu)}
    .nut-more svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .menu-noi-dung{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--vien);border-radius:12px;box-shadow:var(--bong);padding:6px;min-width:140px;display:none;z-index:20}
    .menu-noi-dung.mo{display:block}
    .menu-noi-dung button{width:100%;text-align:left;padding:10px 12px;border-radius:10px;background:transparent;color:var(--chu)}
    .menu-noi-dung button:hover{background:var(--the-2)}
    .loi-moi{padding:12px;border-radius:14px;background:var(--the-2);border:1px solid var(--vien)}
    .toast-wrap{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:60}
    .toast{padding:12px 16px;border-radius:14px;background:#1E3A5F;color:#fff;box-shadow:var(--bong)}
    .modal-nen{position:fixed;inset:0;background:rgba(17,24,39,.22);display:none;place-items:center;padding:18px;z-index:50}
    .modal-nen.mo{display:grid}
    .modal{width:min(100%,760px);max-height:90vh;overflow:auto;background:#FFFFFF;border:1px solid var(--vien);border-radius:22px;padding:22px;box-shadow:var(--bong)}
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .modal h2{margin:0;font-size:22px}.modal p{margin:6px 0 0;color:var(--phu)}
    .seg{margin-top:18px;display:flex;gap:8px;background:var(--the-2);padding:6px;border-radius:999px;width:max-content}
    .seg button{padding:10px 16px;border-radius:999px;background:transparent;color:var(--phu)}
    .seg .on{background:#fff;color:var(--chu)}
    .form{display:grid;gap:14px;margin-top:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form label{display:grid;gap:8px;color:var(--phu)}
    textarea.o{min-height:120px;resize:vertical}
    .foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .danger{background:#f4e5e3;color:var(--do)}
    .drawer{position:fixed;top:0;right:-440px;width:min(100%,440px);height:100vh;background:#FFFFFF;border-left:1px solid var(--vien);box-shadow:var(--bong);z-index:55;padding:22px;transition:right .24s ease;overflow-y:auto;overscroll-behavior:contain}
    .drawer.mo{right:0}
    .drawer-back{position:fixed;inset:0;background:rgba(17,24,39,.18);display:none;z-index:54}.drawer-back.mo{display:block}
    .muted{color:var(--phu)}

    .tep-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .nut-tep{width:40px;height:40px;border-radius:10px;background:#fff;border:1px solid var(--vien);color:#24324a;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nut-tep:hover{background:#F3F4F6}
    .nut-tep svg{width:18px;height:18px;display:block;stroke:currentColor!important;fill:none!important;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .preview-list{display:grid;gap:10px;margin-top:8px}
    .tep-actions-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}

function lay_ngay_tu_iso(iso){ if(!iso) return ''; const d = new Date(iso); if(Number.isNaN(d.getTime())) return ''; return d.toISOString().slice(0,10); }

function dinh_dang_kich_thuoc(bytes){
  if(!bytes) return '';
  const don_vi = ['B','KB','MB','GB'];
  let i = 0, n = bytes;

  return `${n.toFixed(n >= 10 || i===0 ? 0 : 1)} ${don_vi[i]}`;

function lay_text_tu_html(html){
  const div = document.createElement('div');
  div.innerHTML = sanitize_html(html || '');
  return (div.textContent || '').replace(/ /g,' ').trim();
}
function sanitize_html(html){
  const template = document.createElement('template');
  template.innerHTML = String(html || '');
  const hop_le = new Set(['P','BR','B','STRONG','I','EM','U','UL','OL','LI','A','IMG','DIV']);
  const walk = (node) => {
    Array.from(node.children).forEach(el => {
      if(!hop_le.has(el.tagName)){
        const parent = el.parentNode;
        while(el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
        return;
      }
      Array.from(el.attributes).forEach(attr => {
        const ten = attr.name.toLowerCase();
        if(el.tagName === 'A'){
          if(!['href','target','rel'].includes(ten)) el.removeAttribute(attr.name);
        }else if(el.tagName === 'IMG'){
          if(!['src','alt'].includes(ten)) el.removeAttribute(attr.name);
        }else{
          el.removeAttribute(attr.name);
        }
      });
      if(el.tagName === 'A'){
        const href = el.getAttribute('href') || '';
        if(!/^https?:/i.test(href)) el.removeAttribute('href');
        el.setAttribute('target','_blank');
        el.setAttribute('rel','noopener noreferrer');
      }
      if(el.tagName === 'IMG'){
        const src = el.getAttribute('src') || '';
        if(!src.startsWith('data:image/')) el.remove();
      }
      walk(el);
    });
  };
  walk(template.content);
  return template.innerHTML.replace(/<div>/g,'<p>').replace(/<\/div>/g,'</p>').trim();
}

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function dang_ky(){
  const ten = document.getElementById('dk_ten').value.trim();
  const ho_ten = document.getElementById('dk_ho_ten').value.trim();
  const mk = document.getElementById('dk_mk').value;
  if(!ten || !ho_ten || !mk){ toast('Nhập đầy đủ thông tin'); return; }
  if(du_lieu.nguoi_dung.some(x=>x.ten_dang_nhap===ten)){ toast('Tên đăng nhập đã tồn tại'); return; }
  du_lieu.nguoi_dung.push({ten_dang_nhap:ten, ho_ten, mat_khau:mk});
  luu_du_lieu();
  toast('Đăng ký thành công');
  giao_dien.che_do_auth='dang_nhap';
  render();
}
function dang_xuat(){ localStorage.removeItem(PHIEN); giao_dien.mo_menu=false; render(); }
function doi_hien_mat_khau(id, nut){ const o = document.getElementById(id); if(!o) return; const dangAn = o.type === 'password'; o.type = dangAn ? 'text' : 'password'; nut.textContent = dangAn ? 'Ẩn' : 'Hiện'; }

function render(){
  const u = nguoi_hien_tai();
  const modal = document.getElementById('modal_tao');
  const drawer = document.getElementById('drawer');
  const drawerBack = document.getElementById('drawer_back');
  const modalDangMo = modal.classList.contains('mo');
  const drawerDangMo = drawer.classList.contains('mo') && giao_dien.drawer;
  document.getElementById('ung_dung').innerHTML = u ? man_hinh_chinh(u) : man_hinh_auth();
  if(modalDangMo){
    modal.classList.add('mo');
    render_form_tao();
  }else{
    modal.classList.remove('mo');
  }
  if(drawerDangMo){
    drawer.classList.add('mo');
    drawerBack.classList.add('mo');
    drawer.innerHTML = render_drawer(giao_dien.drawer.kieu, giao_dien.drawer.id);
  }else{
    drawer.classList.remove('mo');
    drawerBack.classList.remove('mo');
  }
}
function render_feed(){
  const u = nguoi_hien_tai();
  const root = document.getElementById('ung_dung');
  if(!u || !root) return render();
  const main = root.querySelector('main.giua');
  if(!main) return render();
  const danh_sach = lay_feed_hien_thi(u);
  const feed = main.querySelector('section.feed');
  if(feed) feed.innerHTML = danh_sach.map(b=>render_bai(b,u)).join('') || '<div class="the">Chưa có nội dung nào.</div>';
}

function khung_loi_moi_nhan(ten_dang_nhap){
  const ds = du_lieu.loi_moi.filter(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi');
  if(!ds.length) return '';
  return `<div class="card-side" style="margin-top:16px"><h3>Lời mời chờ phản hồi</h3><div class="list">${ds.map(l=>`<div class="loi-moi"><div>${lay_ten(l.nguoi_gui)} mời bạn vào nhóm</div><div class="mini" style="margin-top:4px">${l.thoi_gian}</div><div style="margin-top:10px;display:flex;gap:8px"><button class="nut-chinh" onclick="phan_hoi_loi_moi(${l.id}, 'chap_nhan')">Chấp nhận</button><button class="nut-phu" onclick="phan_hoi_loi_moi(${l.id}, 'tu_choi')">Từ chối</button></div></div>`).join('')}</div></div>`
}

    <article class="the">
      <div class="the-head">
        <div class="meta">
          <div class="avatar">${avatar_chu(lay_ten(b.tac_gia))}</div>
          <div>
            <div class="ten">${lay_ten(b.tac_gia)}</div>
            <div class="sub">${b.thoi_gian}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">

          ${render_rich_text(`sua_bai_noi_dung_${b.id}`, 'sua_bai', 'noi_dung', tam.noi_dung_html || '', 'Viết nội dung')}
          <div><div class="tep-actions"><button type="button" class="nut-tep" onclick="document.getElementById('sua_bai_tep_${b.id}').click()" title="Thêm tệp">${ICON_TEP}</button><input class="an" id="sua_bai_tep_${b.id}" type="file" multiple onchange="them_file_sua_bai(${b.id}, this, 'tep')" /></div>${render_preview_sua_bai(b.id)}</div>

      `}
      ${la_gui_toan_nhom(b) || b.deadline ? `
        <div class="task-box">
          <div class="task-grid">
            <div class="task-item"><div class="k">Người nhận</div><div class="v">${nhan_nguoi_nhan(b)}</div></div>
            <div class="task-item"><div class="k">Deadline</div><div class="v">${b.deadline||'None'}</div></div>
            <div class="task-item"><div class="k">Kiểu</div><div class="v">Nội dung nhóm</div></div>
          </div>
        </div>
      `:''}
      <div class="tuong-tac">
        <button class="tt-btn ${da_thich?'on':''}" onclick="thich_bai(${b.id})"><span class="icon-inline tim-icon">${ICON_TIM}</span><span>${b.thich.length}</span></button>
        <button class="tt-btn" onclick="mo_drawer('binh_luan', ${b.id})"><span class="icon-inline">${ICON_BINH_LUAN}</span><span>${bls.length}</span></button>
      </div>
    </article>`;
}

        <div>${render_preview_sua_binh_luan(bl.id)}</div>

      </div>`; })()}` : `${render_noi_dung_html(bl, 'bl-nd')}${render_dinh_kem(bl.anh_dinh_kem || [], bl.tep_dinh_kem || [], `bl_${bl.id}`)}`}

function nhan_nguoi_gui_dang_chon(){
  const ds = Array.isArray(giao_dien.tim_nguoi_gui) ? giao_dien.tim_nguoi_gui : [];
  if(!ds.length) return 'Người gửi';
  return ds.length === 1 ? lay_ten(ds[0]) : `${ds.length} người gửi`;
}
function nhan_nguoi_nhan_dang_chon(){
  const ds = Array.isArray(giao_dien.tim_nguoi_nhan) ? giao_dien.tim_nguoi_nhan : [];
  if(!ds.length) return 'Người nhận';
  if(ds.length === 1 && ds[0] === 'toan_nhom') return 'Toàn nhóm';
  return ds.length === 1 ? lay_ten(ds[0]) : `${ds.length} người nhận`;
}
function nhan_ngay_gui_dang_chon(){
  if(giao_dien.tim_ngay_tu && giao_dien.tim_ngay_den) return 'Ngày gửi';
  if(giao_dien.tim_ngay_tu || giao_dien.tim_ngay_den) return 'Ngày gửi';
  return 'Ngày gửi';
}
function toggle_loc_menu(loai, event){
  if(event) event.stopPropagation();
  const dangMo = giao_dien.menu_loc===loai;
  giao_dien.menu_loc = dangMo ? null : loai;
  giao_dien.mo_goi_y_ngay = !dangMo && loai==='ngay_gui' ? giao_dien.mo_goi_y_ngay : false;
  render();
}
function toggle_goi_y_ngay(event){
  if(event) event.stopPropagation();
  giao_dien.mo_goi_y_ngay = !giao_dien.mo_goi_y_ngay;
  render();
}
function chon_nguoi_gui_tim_kiem(tenDangNhap){
  const hienTai = Array.isArray(giao_dien.tim_nguoi_gui) ? [...giao_dien.tim_nguoi_gui] : [];
  const co = hienTai.includes(tenDangNhap);
  giao_dien.tim_nguoi_gui = co ? hienTai.filter(x=>x!==tenDangNhap) : [...hienTai, tenDangNhap];
  render();
}
function chon_nguoi_nhan_tim_kiem(tenDangNhap){
  const hienTai = Array.isArray(giao_dien.tim_nguoi_nhan) ? [...giao_dien.tim_nguoi_nhan] : [];
  if(tenDangNhap === 'tat_ca'){
    giao_dien.tim_nguoi_nhan = [];
    render();
    return;
  }
  const co = hienTai.includes(tenDangNhap);
  giao_dien.tim_nguoi_nhan = co ? hienTai.filter(x=>x!==tenDangNhap) : [...hienTai, tenDangNhap];
  render();
}
function xoa_nguoi_gui_tim_kiem(){
  giao_dien.tim_nguoi_gui = [];
  render();
}
function xoa_nguoi_nhan_tim_kiem(){
  giao_dien.tim_nguoi_nhan = [];
  render();
}
function chon_goi_y_ngay(kieu){
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const den = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let tu = new Date(den);
  if(kieu==='hom_nay'){ }
  if(kieu==='7_ngay'){ tu.setDate(tu.getDate()-6); }
  if(kieu==='10_ngay'){ tu.setDate(tu.getDate()-9); }
  if(kieu==='15_ngay'){ tu.setDate(tu.getDate()-14); }
  giao_dien.tim_ngay_tu = fmt(tu);
  giao_dien.tim_ngay_den = fmt(den);
  giao_dien.nhanh_ngay = kieu;
  giao_dien.mo_goi_y_ngay = false;
  render();
}
function cap_nhat_ngay_tim_kiem(truong, value){
  giao_dien[truong] = value;
  giao_dien.nhanh_ngay = '';
  render();
}
function render_popup_nguoi_gui(){
  if(giao_dien.menu_loc!=='nguoi_gui') return '';
  const dsChon = Array.isArray(giao_dien.tim_nguoi_gui) ? giao_dien.tim_nguoi_gui : [];
  return `<div class="loc-popup" onclick="event.stopPropagation()"><div class="loc-popup-title">Chọn người gửi</div><div class="loc-popup-list"><button type="button" class="loc-popup-btn ${!dsChon.length?'on':''}" onclick="xoa_nguoi_gui_tim_kiem()"><span>Tất cả</span></button>${du_lieu.nguoi_dung.map(n=>`<button type="button" class="loc-popup-btn ${dsChon.includes(n.ten_dang_nhap)?'on':''}" onclick="chon_nguoi_gui_tim_kiem('${n.ten_dang_nhap}')"><span>${escape_html(n.ho_ten)}</span></button>`).join('')}</div></div>`;
}
function render_popup_nguoi_nhan(){
  if(giao_dien.menu_loc!=='nguoi_nhan') return '';
  const ds = du_lieu.thanh_vien.filter(t=>t.trang_thai==='dang_hoat_dong').map(t=>t.ten_dang_nhap);
  const dsChon = Array.isArray(giao_dien.tim_nguoi_nhan) ? giao_dien.tim_nguoi_nhan : [];

function hop_le_theo_bo_loc_tim_kiem(bai){
  const q = giao_dien.tim.trim().toLowerCase();
  const nguoiGui = Array.isArray(giao_dien.tim_nguoi_gui) ? giao_dien.tim_nguoi_gui : [];
  const nguoiNhan = Array.isArray(giao_dien.tim_nguoi_nhan) ? giao_dien.tim_nguoi_nhan : [];
  const tuNgay = giao_dien.tim_ngay_tu;
  const denNgay = giao_dien.tim_ngay_den;
  const binhLuan = du_lieu.binh_luan.filter(bl => bl.bai_id===bai.id);
  const baiKhopText = !q || [bai.tieu_de,bai.noi_dung,lay_ten(bai.tac_gia), nhan_nguoi_nhan(bai)].join(' ').toLowerCase().includes(q);
  const blKhopText = !q ? false : binhLuan.some(bl => [bl.noi_dung, lay_ten(bl.tac_gia)].join(' ').toLowerCase().includes(q));
  const baiKhopNguoi = !nguoiGui.length || nguoiGui.includes(bai.tac_gia);
  const blKhopNguoi = nguoiGui.length ? binhLuan.some(bl => nguoiGui.includes(bl.tac_gia)) : false;
  const dsNguoiNhanBai = lay_ds_nguoi_nhan(bai);
  const khopNguoiNhan = !nguoiNhan.length || nguoiNhan.some(x => x==='toan_nhom' ? la_gui_toan_nhom(bai) : dsNguoiNhanBai.includes(x));
  const baiKhopNgay = du_lieu_hop_le_theo_ngay(bai, tuNgay, denNgay);
  const blKhopNgay = binhLuan.some(bl => du_lieu_hop_le_theo_ngay(bl, tuNgay, denNgay));
  const canLocText = !!q;
  const canLocNguoi = nguoiGui.length > 0;
  const canLocNguoiNhan = nguoiNhan.length > 0;
  const canLocNgay = !!(tuNgay || denNgay);
  const khopText = !canLocText || baiKhopText || blKhopText;
  const khopNguoi = !canLocNguoi || baiKhopNguoi || blKhopNguoi;
  const khopNgay = !canLocNgay || baiKhopNgay || blKhopNgay;
  return khopText && khopNguoi && (!canLocNguoiNhan || khopNguoiNhan) && khopNgay;
}
function lay_feed_hien_thi(u){
  let ds = du_lieu.bai_viet.filter(b=>{
    if(la_truong_nhom(u.ten_dang_nhap)) return true;
    return la_gui_toan_nhom(b) || lay_ds_nguoi_nhan(b).includes(u.ten_dang_nhap) || b.tac_gia===u.ten_dang_nhap;
  });
  if(giao_dien.bo_loc==='bai_viet') ds = ds.filter(b=>la_gui_toan_nhom(b));
  if(giao_dien.bo_loc==='task') ds = ds.filter(b=>!la_gui_toan_nhom(b) || !!b.deadline);
  if(giao_dien.bo_loc==='cua_toi') ds = ds.filter(b=>b.tac_gia===u.ten_dang_nhap || lay_ds_nguoi_nhan(b).includes(u.ten_dang_nhap));
  ds = ds.filter(hop_le_theo_bo_loc_tim_kiem);
  return ds.sort((a,b)=>new Date(lay_moc_thoi_gian(b)).getTime() - new Date(lay_moc_thoi_gian(a)).getTime() || b.id-a.id);
}

function luu_noi_dung_moi(){
  const u = nguoi_hien_tai();
  if(du_lieu.nhom.trang_thai!=='dang_hoat_dong') return toast('Nhóm đang ở chế độ chỉ đọc');
  const tieu_de = (giao_dien.tao_nhap.tieu_de||'').trim();
  const noi_dung_html = sanitize_html(giao_dien.tao_nhap.noi_dung_html || chuyen_text_thanh_html(giao_dien.tao_nhap.noi_dung||''));
  const noi_dung = lay_text_tu_html(noi_dung_html);
  const co_dinh_kem = giao_dien.tao_tep.length || /<img|<a|<ul|<ol|<p|<br/i.test(noi_dung_html);
  if(!noi_dung && !co_dinh_kem) return toast('Viết nội dung hoặc đính kèm trước khi đăng');
  const nguoi_nhan = Array.isArray(giao_dien.tao_nhap.nguoi_nhan) && giao_dien.tao_nhap.nguoi_nhan.length ? [...giao_dien.tao_nhap.nguoi_nhan] : ['toan_nhom'];
  const moi = {
    id:id_moi(du_lieu.bai_viet),
    kieu:'bai_viet',
    tieu_de,
    noi_dung,
    noi_dung_html,
    tac_gia:u.ten_dang_nhap,
    nguoi_nhan,
    deadline:giao_dien.tao_nhap.deadline || '',
    thich:[],
    da_sua:false,
    thoi_gian:thoi_gian(),
    created_at:thoi_gian_iso(),
    anh_dinh_kem:[...giao_dien.tao_anh],
    tep_dinh_kem:[...giao_dien.tao_tep]
  };
  du_lieu.bai_viet.push(moi);
  lay_ds_nguoi_nhan(moi).filter(x=>x!=='toan_nhom' && x!==u.ten_dang_nhap).forEach(tenDangNhap=>{
    du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:tenDangNhap, noi_dung:'Bạn được thêm vào một nội dung mới.', da_doc:false});

  return '';
}
function trang_thai_loi_moi(v){ return {cho_phan_hoi:'Chờ phản hồi',chap_nhan:'Đã chấp nhận',tu_choi:'Đã từ chối'}[v] || v; }
function gui_loi_moi(ten_dang_nhap){
  const u=nguoi_hien_tai();
  if(du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi')) return toast('Đã có lời mời chờ phản hồi');
  du_lieu.loi_moi.push({id:id_moi(du_lieu.loi_moi), nguoi_gui:u.ten_dang_nhap, nguoi_nhan:ten_dang_nhap, trang_thai:'cho_phan_hoi', thoi_gian:thoi_gian()});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:ten_dang_nhap, noi_dung:'Bạn có một lời mời vào nhóm.', da_doc:false});
  luu_du_lieu(); mo_drawer('moi_thanh_vien'); toast('Đã gửi lời mời');
}
function co_loi_moi_cho(ten_dang_nhap){ return du_lieu.loi_moi.some(l=>l.nguoi_nhan===ten_dang_nhap && l.trang_thai==='cho_phan_hoi'); }
function phan_hoi_loi_moi(id, hanh_dong){
  const l=du_lieu.loi_moi.find(x=>x.id===id); if(!l) return;
  l.trang_thai = hanh_dong;
  if(hanh_dong==='chap_nhan' && !la_thanh_vien(l.nguoi_nhan)) du_lieu.thanh_vien.push({ten_dang_nhap:l.nguoi_nhan,vai_tro:'thanh_vien',trang_thai:'dang_hoat_dong'});
  du_lieu.thong_bao.push({id:id_moi(du_lieu.thong_bao), nguoi_nhan:l.nguoi_gui, noi_dung:`${lay_ten(l.nguoi_nhan)} ${hanh_dong==='chap_nhan'?'đã chấp nhận':'đã từ chối'} lời mời.`, da_doc:false});
  luu_du_lieu(); render(); toast(hanh_dong==='chap_nhan'?'Đã tham gia nhóm':'Đã từ chối lời mời');
}

function toast(noi_dung){ const wrap=document.getElementById('toast_wrap'); if(!wrap) return; const div=document.createElement('div'); div.className='toast'; div.textContent=noi_dung; wrap.appendChild(div); setTimeout(()=>div.remove(),2200); }
function escape_html(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function escape_attr_js(s){ return String(s??'').replaceAll('\\','\\\\').replaceAll("'", "\'").replaceAll('\n',' '); }

document.addEventListener('click', (e) => {
  let canRender = false;
  if(giao_dien.menu_hanh_dong && !e.target.closest('.hanh-dong-wrap')){
    giao_dien.menu_hanh_dong = null;
    canRender = true;
  }
  if(giao_dien.menu_tep && !e.target.closest('.tep-menu-wrap')){
    giao_dien.menu_tep = null;
    canRender = true;
  }
  if(giao_dien.menu_tao_nguoi_nhan && !e.target.closest('.tao-loc-wrap')){
    giao_dien.menu_tao_nguoi_nhan = false;
    const form = document.getElementById('form_tao');
    if(form && document.getElementById('modal_tao')?.classList.contains('mo')) render_form_tao();
  }
  if(canRender) render();
});

render();
document.addEventListener('click', (e)=>{
  const img = e.target.closest('.noi-dung-bai img, .bl-nd img');
  if(img) mo_xem_anh(img.src);
});
</script>
</body>
